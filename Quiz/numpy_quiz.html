<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NumPy Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 820px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .badge { display: inline-block; background: #1f3a28; color: #56d364; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; border: 1px solid #2ea043; margin-bottom: 1rem; }
  h1 { font-size: 2rem; font-weight: 700; color: #e6edf3; margin-bottom: 0.5rem; }
  h1 span { color: #56d364; }
  .subtitle { color: #8b949e; font-size: 0.95rem; }

  .quiz-layout { display: grid; grid-template-columns: 170px 1fr; gap: 1.25rem; align-items: start; }

  /* Navigator */
  .q-nav { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1rem; position: sticky; top: 1rem; }
  .q-nav-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; margin-bottom: 0.75rem; }
  .q-nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 1rem; }
  .q-dot {
    width: 100%; aspect-ratio: 1; border-radius: 6px;
    border: 1.5px solid #30363d; background: #1c2128; color: #8b949e;
    font-size: 11px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .q-dot:hover { border-color: #56d364; color: #56d364; }
  .q-dot.active { border-color: #56d364; background: #1f3a28; color: #56d364; box-shadow: 0 0 0 2px #56d36430; }
  .q-dot.s-correct { border-color: #2ea043; background: #1a3326; color: #56d364; }
  .q-dot.s-wrong { border-color: #da3633; background: #3d1a1a; color: #ff7b72; }

  .divider { border: none; border-top: 1px solid #30363d; margin: 0.75rem 0; }
  .progress-wrap { margin-bottom: 0.4rem; }
  .progress-bar-bg { background: #21262d; border-radius: 8px; height: 5px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #2ea043, #56d364); border-radius: 8px; transition: width 0.4s; }
  .progress-txt { font-size: 11px; color: #8b949e; text-align: center; margin-top: 4px; }

  .legend { margin-top: 0.75rem; }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 10px; color: #8b949e; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .sw-current { background: #1f3a28; border: 1px solid #56d364; }
  .sw-correct { background: #1a3326; border: 1px solid #2ea043; }
  .sw-wrong { background: #3d1a1a; border: 1px solid #da3633; }
  .sw-open { background: #1c2128; border: 1px solid #30363d; }

  /* Card */
  .quiz-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2rem; }
  .q-number { font-size: 11px; font-weight: 600; color: #56d364; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .q-text { font-size: 1.05rem; font-weight: 500; color: #e6edf3; line-height: 1.6; margin-bottom: 1.5rem; }
  .code-block { font-family: 'Courier New', monospace; background: #1f2937; color: #c9d1d9; padding: 1rem; border-radius: 8px; font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.5rem; border-left: 3px solid #56d364; white-space: pre; overflow-x: auto; }
  .options { display: grid; gap: 10px; }
  .option-btn { display: flex; align-items: center; gap: 12px; background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 0.9rem 1.1rem; cursor: pointer; text-align: left; color: #e6edf3; font-size: 0.93rem; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .option-btn:hover:not(:disabled) { border-color: #56d364; background: #1f3a28; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: #2ea043; background: #1f3a28; color: #56d364; }
  .option-btn.wrong { border-color: #da3633; background: #3d1a1a; color: #ff7b72; }
  .opt-label { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #30363d; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; color: #8b949e; transition: all 0.15s; }
  .option-btn.correct .opt-label { border-color: #56d364; color: #56d364; background: #1a3326; }
  .option-btn.wrong .opt-label { border-color: #da3633; color: #ff7b72; background: #3d1a1a; }

  .feedback { margin-top: 1rem; padding: 0.85rem 1rem; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.correct { background: #1f3a28; border: 1px solid #2ea043; color: #7ee787; }
  .feedback.wrong { background: #3d1a1a; border: 1px solid #da3633; color: #ffa198; }
  .feedback.show { display: block; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; gap: 8px; flex-wrap: wrap; }
  .score-mini { font-size: 13px; color: #8b949e; }
  .score-mini span { color: #56d364; font-weight: 600; }
  .btn-row { display: flex; gap: 8px; }
  .btn-nav { border-radius: 8px; padding: 0.55rem 1rem; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid #30363d; background: #1c2128; color: #8b949e; }
  .btn-nav:hover:not(:disabled) { border-color: #56d364; color: #56d364; }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-next-q { background: #238636; color: #fff; border-color: #238636; display: none; }
  .btn-next-q:hover:not(:disabled) { background: #2ea043; border-color: #2ea043; color: #fff; }
  .btn-next-q.show { display: inline-block; }
  .btn-finish { background: #1f6feb; color: #fff; border-color: #1f6feb; display: none; }
  .btn-finish:hover { background: #388bfd; }
  .btn-finish.show { display: inline-block; }

  /* Results */
  .results-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2.5rem; text-align: center; display: none; }
  .results-card.show { display: block; }
  .score-circle { width: 110px; height: 110px; border-radius: 50%; background: #0d2a18; border: 4px solid #56d364; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .score-big { font-size: 2rem; font-weight: 700; color: #56d364; line-height: 1; }
  .score-total { font-size: 0.8rem; color: #8b949e; margin-top: 2px; }
  .results-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; }
  .results-msg { color: #8b949e; font-size: 0.93rem; margin-bottom: 2rem; }
  .stat-row { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
  .stat-box { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 0.75rem 1.25rem; font-size: 0.85rem; color: #8b949e; }
  .stat-box strong { display: block; font-size: 1.2rem; font-weight: 600; color: #e6edf3; }
  .btn-restart { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 0.75rem 2rem; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .btn-restart:hover { background: #2ea043; }

  @media (max-width: 580px) {
    .quiz-layout { grid-template-columns: 1fr; }
    .q-nav { position: static; }
    .q-nav-grid { grid-template-columns: repeat(8, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">📐 NumPy Basics</div>
    <h1>NumPy <span>Quiz</span></h1>
    <p class="subtitle">Test your knowledge of NumPy arrays, math operations &amp; Titanic analysis</p>
  </div>

  <div id="quiz-section">
    <div class="quiz-layout">
      <div class="q-nav">
        <div class="q-nav-title">Jump to question</div>
        <div class="q-nav-grid" id="q-nav-grid"></div>
        <hr class="divider">
        <div class="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-txt" id="progress-txt">0 / 15 answered</div>
        </div>
        <div class="legend">
          <div class="legend-row"><div class="legend-swatch sw-current"></div>Current</div>
          <div class="legend-row"><div class="legend-swatch sw-correct"></div>Correct</div>
          <div class="legend-row"><div class="legend-swatch sw-wrong"></div>Wrong</div>
          <div class="legend-row"><div class="legend-swatch sw-open"></div>Unanswered</div>
        </div>
      </div>
      <div>
        <div class="quiz-card">
          <div class="q-number" id="q-number">Question 1</div>
          <div class="q-text" id="q-text"></div>
          <div class="code-block" id="code-block" style="display:none"></div>
          <div class="options" id="options"></div>
          <div class="feedback" id="feedback"></div>
          <div class="nav-row">
            <div class="score-mini">Score: <span id="score-display">0</span> / 15</div>
            <div class="btn-row">
              <button class="btn-nav" id="btn-prev" onclick="go(current-1)">← Prev</button>
              <button class="btn-nav btn-next-q" id="btn-next" onclick="onNext()">Next →</button>
              <button class="btn-nav btn-finish" id="btn-finish" onclick="showResults()">Finish ✓</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="results-card" id="results-card">
    <div class="score-circle"><div class="score-big" id="final-score">0</div><div class="score-total" id="final-total">/ 15</div></div>
    <div class="results-title" id="results-title"></div>
    <div class="results-msg" id="results-msg"></div>
    <div class="stat-row">
      <div class="stat-box"><strong id="stat-correct">0</strong>Correct</div>
      <div class="stat-box"><strong id="stat-wrong">0</strong>Wrong</div>
      <div class="stat-box"><strong id="stat-pct">0%</strong>Score</div>
    </div>
    <button class="btn-restart" onclick="restart()">Restart Quiz</button>
  </div>
</div>
<script>
const Q = [
  { q:"What does <code>np.array([15, 22, 18, 30])</code> create?", options:["A Python list","A NumPy ndarray","A Pandas Series","A dictionary"], answer:1, feedback:"np.array() creates a NumPy ndarray — similar to a list but much faster for numerical calculations." },
  { q:"Given <code>daily_sales = np.array([15, 22, 18, 30, 27])</code>, what does <code>daily_sales + 5</code> return?", options:["[20, 22, 18, 30, 27]","[15, 22, 18, 30, 32]","[20, 27, 23, 35, 32]","Error"], answer:2, feedback:"NumPy applies the operation to ALL elements at once — no loop needed. 15+5=20, 22+5=27, 18+5=23, 30+5=35, 27+5=32." },
  { q:"Which NumPy function calculates the average (mean) of an array?", options:["np.median()","np.avg()","np.mean()","np.sum()/len()"], answer:2, feedback:"np.mean() is the correct function. np.median() gives the middle value, not the average." },
  { q:"What does np.median() return for the array <code>[76, 78, 85, 88, 91, 92, 95]</code>?", options:["85","88","91","86.5"], answer:1, feedback:"The median is the middle value when sorted. For 7 elements, the 4th value is the median → 88." },
  { q:"What does <code>np.argmax(scores)</code> return?", code:"scores = np.array([85, 92, 78, 95, 88, 76, 91])", options:["95 (the maximum value)","3 (the index of the maximum)","4 (position 4)","np.nan"], answer:1, feedback:"np.argmax() returns the INDEX (position) of the highest value, not the value itself. 95 is at index 3." },
  { q:"What does the 75th percentile represent in salary data?", options:["75% of employees earn above this amount","75% of employees earn below this amount","The salary of the 75th employee","The average of the top 75 employees"], answer:1, feedback:"The 75th percentile means 75% of values are BELOW this point. Only the top 25% earn more than you." },
  { q:"What does this filtering code do?", code:"ages = np.array([25, 34, 17, 45, 12, 60])\nadult_filter = ages >= 18\nadult_ages = ages[adult_filter]", options:["Returns [False, True, False, True, False, True]","Returns [25, 34, 45, 60]","Returns the count of adults","Sorts ages from youngest to oldest"], answer:1, feedback:"Boolean indexing: adult_filter creates a True/False mask, then ages[adult_filter] keeps only the True values — giving [25, 34, 45, 60]." },
  { q:"What is the purpose of <code>np.where(condition, value_if_true, value_if_false)</code>?", options:["Filters and returns only matching values","Returns the index of matching values","Applies IF-ELSE logic element-wise across an array","Counts how many elements match a condition"], answer:2, feedback:"np.where() is like applying an IF-ELSE to every element. E.g., np.where(ages < 18, 'Child', 'Adult') labels every element." },
  { q:"What does <code>np.std(daily_sales)</code> tell you?", options:["The total of all sales","How spread out or variable the values are from the mean","The standard order of values","The median deviation"], answer:1, feedback:"Standard deviation measures spread. Low std = consistent values. High std = wide variation." },
  { q:"What does <code>np.cumsum([10, 20, 30, 40])</code> return?", options:["100","[10, 30, 60, 100]","[10, 20, 30, 40]","[10, 10, 10, 10]"], answer:1, feedback:"np.cumsum() gives a running total: 10 → 30 → 60 → 100." },
  { q:"What does <code>np.clip(fares, 0, 100)</code> do to the Titanic fare data?", options:["Removes all fares above 100","Sets any fare below 0 to 0, and any above 100 to 100","Divides all fares by 100","Rounds fares to the nearest 100"], answer:1, feedback:"np.clip() caps values within a range. Values outside the bounds are clamped to the min or max." },
  { q:"In normalization, what formula makes all values fall between 0 and 1?", options:["(value - mean) / std","(value - min) / (max - min)","(value / sum) * 100","value - median"], answer:1, feedback:"Min-max normalization: subtract the minimum, divide by the range. Min → 0, Max → 1." },
  { q:"What does <code>np.unique(age_groups, return_counts=True)</code> return?", options:["All unique categories only","A tuple of (unique values, count of each unique value)","The most common category","A sorted array with duplicates removed"], answer:1, feedback:"When return_counts=True, np.unique() returns both the unique values AND the count of each — like value_counts()." },
  { q:"What is the key advantage of NumPy arrays over Python lists for analytics?", options:["NumPy arrays can hold text, numbers, and objects together","NumPy performs math on all elements at once without loops — much faster","NumPy arrays have automatic column labels","NumPy stores data as tables with rows and columns"], answer:1, feedback:"NumPy's vectorized operations apply math to all elements simultaneously using C under the hood — much faster than Python loops." },
  { q:"In the Titanic analysis, what does this code compute?", code:"pclass_array = df['Pclass'].to_numpy()\nfare_array   = df['Fare'].to_numpy()\nfilter_cls = pclass_array == 1\nclass_fares = fare_array[filter_cls]", options:["Sorts all fares from Class 1 passengers","Extracts only the fares paid by Class 1 passengers","Counts how many Class 1 passengers exist","Replaces Class 1 fares with the mean"], answer:1, feedback:"filter_cls creates a boolean mask where Pclass == 1. Applying it to fare_array extracts only first-class fares." }
];

const TOTAL = Q.length;
let current = 0, score = 0;
const state = Array(TOTAL).fill(null);   // null | 'correct' | 'wrong'
const chosen = Array(TOTAL).fill(null);  // index chosen

function buildNav() {
  const grid = document.getElementById('q-nav-grid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const b = document.createElement('button');
    b.className = 'q-dot'; b.textContent = i + 1; b.id = `d${i}`;
    b.onclick = () => go(i);
    grid.appendChild(b);
  }
}

function refreshNav() {
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById(`d${i}`);
    d.className = 'q-dot';
    if (state[i] === 'correct') d.classList.add('s-correct');
    else if (state[i] === 'wrong') d.classList.add('s-wrong');
    if (i === current) d.classList.add('active');
  }
  const done = state.filter(s => s !== null).length;
  document.getElementById('progress-fill').style.width = `${(done / TOTAL) * 100}%`;
  document.getElementById('progress-txt').textContent = `${done} / ${TOTAL} answered`;
}

function go(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  current = idx;
  render();
}

function render() {
  const q = Q[current];
  document.getElementById('q-number').textContent = `Question ${current + 1}`;
  document.getElementById('q-text').innerHTML = q.q;
  const cb = document.getElementById('code-block');
  if (q.code) { cb.textContent = q.code; cb.style.display = 'block'; }
  else cb.style.display = 'none';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const L = ['A','B','C','D'];
  q.options.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'option-btn';
    b.innerHTML = `<span class="opt-label">${L[i]}</span><span>${o}</span>`;
    b.id = `o${i}`;
    b.onclick = () => pick(i);
    opts.appendChild(b);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';

  if (state[current] !== null) {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    document.getElementById(`o${chosen[current]}`).classList.add(state[current]);
    if (state[current] === 'wrong') document.getElementById(`o${q.answer}`).classList.add('correct');
    fb.textContent = (state[current] === 'correct' ? '✓ Correct! ' : '✗ Not quite. ') + q.feedback;
    fb.className = `feedback ${state[current]} show`;
  }

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('score-display').textContent = score;

  const allDone = state.every(s => s !== null);
  const nextBtn = document.getElementById('btn-next');
  const finBtn = document.getElementById('btn-finish');

  if (state[current] !== null) {
    if (current === TOTAL - 1 || allDone) {
      nextBtn.classList.remove('show');
      if (allDone) finBtn.classList.add('show'); else finBtn.classList.remove('show');
    } else {
      nextBtn.classList.add('show');
      finBtn.classList.remove('show');
    }
  } else {
    nextBtn.classList.remove('show');
    finBtn.classList.remove('show');
  }

  refreshNav();
}

function pick(idx) {
  if (state[current] !== null) return;
  const q = Q[current];
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  chosen[current] = idx;
  const correct = idx === q.answer;
  if (correct) score++;
  state[current] = correct ? 'correct' : 'wrong';
  document.getElementById(`o${idx}`).classList.add(state[current]);
  if (!correct) document.getElementById(`o${q.answer}`).classList.add('correct');
  const fb = document.getElementById('feedback');
  fb.textContent = (correct ? '✓ Correct! ' : '✗ Not quite. ') + q.feedback;
  fb.className = `feedback ${state[current]} show`;
  document.getElementById('score-display').textContent = score;

  const allDone = state.every(s => s !== null);
  const nextBtn = document.getElementById('btn-next');
  const finBtn = document.getElementById('btn-finish');
  if (current === TOTAL - 1 || allDone) {
    nextBtn.classList.remove('show');
    if (allDone) finBtn.classList.add('show');
  } else {
    nextBtn.classList.add('show');
  }
  refreshNav();
}

function onNext() {
  const next = current + 1 < TOTAL ? current + 1 : state.findIndex(s => s === null);
  if (next !== -1) go(next);
}

function showResults() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('results-card').classList.add('show');
  const pct = Math.round((score / TOTAL) * 100);
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-total').textContent = `/ ${TOTAL}`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = TOTAL - score;
  document.getElementById('stat-pct').textContent = pct + '%';
  const msgs = pct >= 90 ? ['🎉 Excellent!','Outstanding NumPy knowledge! You are ready to analyze real datasets.']
    : pct >= 70 ? ['👍 Good Job!','Solid understanding. Review the questions you missed.']
    : pct >= 50 ? ['📚 Keep Practicing','You have the basics. Revisit filtering, percentiles, and statistics.']
    : ['🔄 Try Again','Review the notebook — focus on np.where(), np.percentile(), and boolean indexing.'];
  document.getElementById('results-title').textContent = msgs[0];
  document.getElementById('results-msg').textContent = msgs[1];
}

function restart() {
  current = 0; score = 0;
  state.fill(null); chosen.fill(null);
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('results-card').classList.remove('show');
  buildNav(); render();
}

buildNav(); render();
</script>
</body>
</html>
