<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Basics Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f2f7;
    --muted: #7a8099;
    --accent: #5b6af0;
    --accent2: #7c8df5;
    --green: #22c98a;
    --red: #f05b5b;
    --amber: #f5a623;
    --cyan: #38d9f5;
    --purple: #b06cf0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--muted);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .header-right {
    display: flex; gap: 16px; align-items: center;
  }
  .q-counter {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--muted);
  }
  .score-pill {
    font-size: 12px; font-weight: 600;
    padding: 5px 14px; border-radius: 99px;
    background: rgba(91,106,240,0.15);
    border: 1px solid rgba(91,106,240,0.3);
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    height: 3px; background: var(--surface2);
  }
  .progress-fill {
    height: 3px; background: linear-gradient(90deg, var(--accent), var(--cyan));
    transition: width 0.4s ease;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  /* ── TOPIC BADGE ── */
  .topic-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 5px 14px;
    border-radius: 99px; border: 1px solid;
    margin-bottom: 20px;
    transition: all 0.3s;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    width: 100%; max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 36px 40px;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 20px; font-weight: 600;
    line-height: 1.5; color: var(--text);
    margin-bottom: 20px;
  }
  .q-code {
    font-family: 'DM Mono', monospace;
    font-size: 13.5px; line-height: 1.7;
    background: #0a0c10;
    border: 1px solid var(--border2);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    white-space: pre;
    overflow-x: auto;
    color: #c8d0f0;
  }

  /* ── OPTIONS ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
    .q-card { padding: 24px 20px; }
    .q-text { font-size: 17px; }
  }

  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px; line-height: 1.5;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(91,106,240,0.1);
    transform: translateY(-1px);
  }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500;
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 6px;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: all 0.2s;
  }

  .opt-btn.correct {
    border-color: var(--green);
    background: rgba(34,201,138,0.12);
  }
  .opt-btn.correct .opt-letter {
    background: var(--green); color: #0d0f14;
  }
  .opt-btn.wrong {
    border-color: var(--red);
    background: rgba(240,91,91,0.1);
  }
  .opt-btn.wrong .opt-letter {
    background: var(--red); color: #fff;
  }
  .opt-btn.reveal {
    border-color: rgba(34,201,138,0.4);
    background: rgba(34,201,138,0.06);
    opacity: 0.6;
  }
  .opt-btn.reveal .opt-letter {
    background: rgba(34,201,138,0.3); color: var(--green);
  }

  /* ── FEEDBACK ── */
  .feedback {
    border-radius: 10px; padding: 14px 18px;
    font-size: 14px; line-height: 1.6;
    display: none; animation: fadeUp 0.25s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: rgba(34,201,138,0.1);
    border: 1px solid rgba(34,201,138,0.25);
    color: #6fffd4;
  }
  .feedback.wrong {
    background: rgba(240,91,91,0.08);
    border: 1px solid rgba(240,91,91,0.2);
    color: #ffaaaa;
  }
  .feedback-icon { font-size: 16px; margin-right: 6px; }

  /* ── NAV ── */
  .nav {
    width: 100%; max-width: 760px;
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px;
  }
  .nav-btn {
    padding: 11px 24px; border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(91,106,240,0.12);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .nav-btn.primary:hover:not(:disabled) {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  /* ── SCORE SCREEN ── */
  .score-screen {
    width: 100%; max-width: 680px;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  .score-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 6px solid var(--surface2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 28px;
    position: relative;
  }
  .score-ring svg {
    position: absolute; top: -6px; left: -6px;
    width: calc(100% + 12px); height: calc(100% + 12px);
  }
  .score-pct {
    font-size: 42px; font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--text);
  }
  .score-sub { font-size: 13px; color: var(--muted); }

  .score-title {
    font-size: 26px; font-weight: 700; margin-bottom: 8px;
  }
  .score-desc { font-size: 15px; color: var(--muted); margin-bottom: 32px; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 12px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px; padding: 20px 12px;
  }
  .stat-val {
    font-size: 32px; font-weight: 700;
    font-family: 'DM Mono', monospace;
    margin-bottom: 4px;
  }
  .stat-lbl { font-size: 12px; color: var(--muted); }

  .topic-breakdown {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px; padding: 24px;
    margin-bottom: 28px; text-align: left;
  }
  .tb-title {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  .tb-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }
  .tb-label { font-size: 13px; color: var(--text); min-width: 130px; }
  .tb-bar-wrap {
    flex: 1; height: 6px; background: var(--surface2);
    border-radius: 3px; overflow: hidden;
  }
  .tb-bar-fill { height: 6px; border-radius: 3px; transition: width 0.6s ease; }
  .tb-frac {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted); min-width: 32px; text-align: right;
  }

  .restart-btn {
    padding: 14px 40px; border-radius: 12px;
    border: none; background: var(--accent);
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 24px rgba(91,106,240,0.3);
  }
  .restart-btn:hover {
    background: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 0 32px rgba(91,106,240,0.45);
  }

  /* ── INTRO ── */
  .intro {
    width: 100%; max-width: 680px;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  .intro-logo {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
  }
  .intro h1 {
    font-size: 32px; font-weight: 700; margin-bottom: 10px;
    line-height: 1.2;
  }
  .intro-sub {
    font-size: 15px; color: var(--muted); margin-bottom: 32px; line-height: 1.6;
  }
  .intro-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 36px;
  }
  .chip {
    font-size: 12px; padding: 5px 13px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    color: var(--muted);
    background: var(--surface);
  }
  .start-btn {
    padding: 15px 48px; border-radius: 12px;
    border: none; background: var(--accent);
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 28px rgba(91,106,240,0.35);
  }
  .start-btn:hover {
    background: var(--accent2);
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    Python Basics Quiz
  </div>
  <div class="header-right">
    <span class="q-counter" id="hdr-counter"></span>
    <span class="score-pill" id="hdr-score" style="display:none"></span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-fill" id="progress" style="width:0%"></div>
</div>

<div class="main" id="main"></div>

<script>
const TOPICS = {
  Variables:      { color: '#5b6af0', bg: 'rgba(91,106,240,0.15)',  border: 'rgba(91,106,240,0.35)' },
  "Data Types":   { color: '#38d9f5', bg: 'rgba(56,217,245,0.12)',  border: 'rgba(56,217,245,0.3)' },
  Strings:        { color: '#f5a623', bg: 'rgba(245,166,35,0.13)',  border: 'rgba(245,166,35,0.3)' },
  Lists:          { color: '#22c98a', bg: 'rgba(34,201,138,0.13)',  border: 'rgba(34,201,138,0.3)' },
  Tuples:         { color: '#b06cf0', bg: 'rgba(176,108,240,0.13)', border: 'rgba(176,108,240,0.3)' },
  Dictionaries:   { color: '#f05b5b', bg: 'rgba(240,91,91,0.12)',   border: 'rgba(240,91,91,0.28)' },
  "If/Else":      { color: '#f5a623', bg: 'rgba(245,166,35,0.13)',  border: 'rgba(245,166,35,0.3)' },
  Loops:          { color: '#38d9f5', bg: 'rgba(56,217,245,0.12)',  border: 'rgba(56,217,245,0.3)' },
  Functions:      { color: '#5b6af0', bg: 'rgba(91,106,240,0.15)',  border: 'rgba(91,106,240,0.35)' },
  "Error Handling":{ color: '#f05b5b', bg: 'rgba(240,91,91,0.12)', border: 'rgba(240,91,91,0.28)' },
  "File Handling":{ color: '#22c98a', bg: 'rgba(34,201,138,0.13)', border: 'rgba(34,201,138,0.3)' },
  Sets:           { color: '#b06cf0', bg: 'rgba(176,108,240,0.13)', border: 'rgba(176,108,240,0.3)' },
  "API & Requests":{ color: '#38d9f5', bg: 'rgba(56,217,245,0.12)', border: 'rgba(56,217,245,0.3)' },
};

const questions = [
  /* ── VARIABLES (5) ── */
  { topic:"Variables", q:"Which of the following is a valid Python variable name?",
    code:null, opts:["2sales","sales-amount","sales_amount","sales amount"], ans:2,
    exp:"Variable names cannot start with a digit, use hyphens, or contain spaces. Underscores are allowed." },

  { topic:"Variables", q:"What is the value of x after this code runs?",
    code:"x = 10\nx = x + 5\nx = x * 2", opts:["10","15","30","50"], ans:2,
    exp:"x starts at 10 → adds 5 → becomes 15 → multiplied by 2 → becomes 30." },

  { topic:"Variables", q:"Which statement correctly assigns a variable?",
    code:null, opts:["45000 = salary","salary == 45000","salary = 45000","salary := 45000"], ans:2,
    exp:"The single = sign is the assignment operator. == is for comparison." },

  { topic:"Variables", q:"What does this f-string print?",
    code:'company = "eSewa"\nprint(f"Welcome to {company}!")', opts:["Welcome to {company}!","Welcome to eSewa!","Error","company"], ans:1,
    exp:"f-strings replace {variable} with the actual value of that variable at runtime." },

  { topic:"Variables", q:"What is printed?",
    code:"a = 5\nb = a\na = 100\nprint(b)", opts:["100","5","None","Error"], ans:1,
    exp:"b = a copies the value 5 into b. Later changing a does not affect b." },

  /* ── DATA TYPES (5) ── */
  { topic:"Data Types", q:"What does type(99.50) return?",
    code:null, opts:["<class 'int'>","<class 'float'>","<class 'str'>","<class 'num'>"], ans:1,
    exp:"Numbers with a decimal point are float in Python." },

  { topic:"Data Types", q:"Which data type stores True or False?",
    code:null, opts:["int","str","float","bool"], ans:3,
    exp:"bool (boolean) stores only True or False — perfect for yes/no situations." },

  { topic:"Data Types", q:"What is the data type of '45000' (with quotes)?",
    code:null, opts:["int","float","str","bool"], ans:2,
    exp:"Anything inside quotes is a string (str), even if it looks like a number." },

  { topic:"Data Types", q:"Which type would you use to store the price Rs. 1250.75?",
    code:null, opts:["int","float","str","bool"], ans:1,
    exp:"float stores decimal (fractional) numbers. int only stores whole numbers." },

  { topic:"Data Types", q:"What does this print?",
    code:'x = True\nprint(type(x))', opts:["<class 'str'>","<class 'int'>","<class 'bool'>","True"], ans:2,
    exp:"True and False are of type bool in Python." },

  /* ── STRINGS (5) ── */
  { topic:"Strings", q:"What does name.upper() do?",
    code:'name = "pathao"\nprint(name.upper())', opts:["pathao","PATHAO","Pathao","Error"], ans:1,
    exp:".upper() converts every character in the string to uppercase." },

  { topic:"Strings", q:"Which method removes spaces from both sides of a string?",
    code:null, opts:[".remove()"," .strip()",".clean()",".trim()"], ans:1,
    exp:".strip() removes leading and trailing whitespace (spaces, tabs, newlines)." },

  { topic:"Strings", q:"What does len('Kathmandu') return?",
    code:null, opts:["7","8","9","10"], ans:2,
    exp:"'Kathmandu' has 9 characters: K-a-t-h-m-a-n-d-u." },

  { topic:"Strings", q:"What does this print?",
    code:'city = "pokhara"\nprint(city.capitalize())', opts:["POKHARA","pokhara","Pokhara","pOKHARA"], ans:2,
    exp:".capitalize() makes only the first letter uppercase, rest lowercase." },

  { topic:"Strings", q:"Which method splits a string into a list?",
    code:'address = "Thamel,Kathmandu,Nepal"\nresult = address.split(",")', opts:["Splits into 2 items","Splits into 3 items","Returns a tuple","Raises an error"], ans:1,
    exp:".split(',') splits on commas: ['Thamel', 'Kathmandu', 'Nepal'] — 3 items." },

  /* ── LISTS (6) ── */
  { topic:"Lists", q:"What is the index of 'Tablet' in this list?",
    code:'products = ["Laptop","Mobile","Tablet","Charger"]', opts:["1","2","3","0"], ans:1,
    exp:"Python indexing starts at 0. Laptop=0, Mobile=1, Tablet=2." },

  { topic:"Lists", q:"Which method adds an item to the END of a list?",
    code:null, opts:[".insert()",".add()",".append()",".push()"], ans:2,
    exp:".append() adds a single item to the end of the list." },

  { topic:"Lists", q:"What does this print?",
    code:'items = ["A","B","C","D"]\nprint(items[-1])', opts:["A","B","C","D"], ans:3,
    exp:"Negative index -1 always refers to the last element in the list." },

  { topic:"Lists", q:"What does .remove('Mobile') do?",
    code:'cart = ["Laptop","Mobile","Charger"]\ncart.remove("Mobile")', opts:["Removes by index","Removes by value and returns it","Removes by value — no return","Raises a TypeError"], ans:2,
    exp:".remove(value) finds and deletes the first matching value. It does not return anything." },

  { topic:"Lists", q:"What is the result of this code?",
    code:'nums = [30,10,50,20]\nnums.sort()\nprint(nums)', opts:["[30,10,50,20]","[10,20,30,50]","[50,30,20,10]","Error"], ans:1,
    exp:".sort() rearranges the list in ascending order (low to high) in place." },

  { topic:"Lists", q:"What does len([1,2,3,4,5]) return?",
    code:null, opts:["4","5","6","0"], ans:1,
    exp:"len() counts the number of items in the list. There are 5 items." },

  /* ── TUPLES (4) ── */
  { topic:"Tuples", q:"Which correctly creates a tuple?",
    code:null, opts:['t = ["Bagmati","Koshi"]','t = ("Bagmati","Koshi")','t = {"Bagmati","Koshi"}','t = <"Bagmati","Koshi">'], ans:1,
    exp:"Tuples use round brackets ( ). Square brackets [ ] are for lists." },

  { topic:"Tuples", q:"What happens if you try to change a value in a tuple?",
    code:'vat = (0.0, 0.13)\nvat[0] = 0.05', opts:["Value changes to 0.05","Nothing happens","TypeError is raised","ValueError is raised"], ans:2,
    exp:"Tuples are immutable — they cannot be modified after creation. A TypeError is raised." },

  { topic:"Tuples", q:"What is printed?",
    code:'info = ("SkillShikshya", 2019, "Kathmandu")\nname, year, city = info\nprint(city)', opts:["SkillShikshya","2019","Kathmandu","Error"], ans:2,
    exp:"This is tuple unpacking — values are assigned to variables left to right." },

  { topic:"Tuples", q:"What is the key difference between a list and a tuple?",
    code:null, opts:["Tuples use square brackets","Lists cannot hold text","Tuples cannot be changed after creation","Lists are faster than tuples"], ans:2,
    exp:"Tuples are immutable (unchangeable). Lists are mutable (can be modified). Use tuples for fixed data like provinces or tax rates." },

  /* ── DICTIONARIES (6) ── */
  { topic:"Dictionaries", q:"What does .get('phone', 'Not provided') return if 'phone' key is missing?",
    code:null, opts:["None","KeyError","Not provided","phone"], ans:2,
    exp:".get(key, default) returns the default value when the key does not exist — it never crashes." },

  { topic:"Dictionaries", q:"Which method adds a key ONLY if it does not already exist?",
    code:null, opts:[".update()",".add()",".setdefault()",".insert()"], ans:2,
    exp:".setdefault(key, value) adds the key only when it is missing. If the key exists, it does nothing." },

  { topic:"Dictionaries", q:"What does .pop('salary', 0) return if 'salary' is missing?",
    code:null, opts:["Raises KeyError","Returns None","Returns 0","Deletes another key"], ans:2,
    exp:".pop(key, default) safely removes the key or returns the default value if key doesn't exist." },

  { topic:"Dictionaries", q:"Which loop gives you both keys AND values?",
    code:'emp = {"name":"Sita","salary":52000}', opts:["for k in emp.keys()","for v in emp.values()","for k,v in emp.items()","for k,v in emp"], ans:2,
    exp:".items() returns each key-value pair as a tuple, which you unpack into two variables." },

  { topic:"Dictionaries", q:"What does this print?",
    code:'d = {"a":1,"b":2,"c":3}\ndel d["b"]\nprint(len(d))', opts:["3","2","1","Error"], ans:1,
    exp:"del removes the key 'b'. The dictionary now has 2 items: 'a' and 'c'." },

  { topic:"Dictionaries", q:"What is wrong with this code?",
    code:'customer = {"name":"Ram","city":"KTM"}\nprint(customer["phone"])', opts:["Nothing — prints None","TypeError","KeyError — 'phone' doesn't exist","IndexError"], ans:2,
    exp:"Using square brackets directly raises a KeyError if the key doesn't exist. Use .get() for safe access." },

  /* ── IF/ELSE (3) ── */
  { topic:"If/Else", q:"What prints when salary = 35000?",
    code:'salary = 35000\nif salary >= 50000:\n    print("Senior")\nelif salary >= 30000:\n    print("Mid")\nelse:\n    print("Junior")', opts:["Senior","Mid","Junior","Error"], ans:1,
    exp:"35000 is not >= 50000, but IS >= 30000, so the elif block executes." },

  { topic:"If/Else", q:"Which operator checks if two values are equal?",
    code:null, opts:["=","!=","==",">="], ans:2,
    exp:"== is the comparison operator. A single = is assignment (stores a value)." },

  { topic:"If/Else", q:"What is printed?",
    code:'x = 10\nif x > 5 and x < 20:\n    print("In range")\nelse:\n    print("Out")', opts:["In range","Out","Error","Nothing"], ans:0,
    exp:"Both conditions are True (10>5 AND 10<20), so 'In range' is printed." },

  /* ── LOOPS (4) ── */
  { topic:"Loops", q:"How many times does this loop run?",
    code:'for i in range(5):\n    print(i)', opts:["4 times","5 times","6 times","1 time"], ans:1,
    exp:"range(5) produces 0,1,2,3,4 — five numbers, so the loop runs 5 times." },

  { topic:"Loops", q:"What does enumerate() add when looping?",
    code:null, opts:["Sorts the list first","Adds an index counter to each item","Removes duplicates","Reverses the list"], ans:1,
    exp:"enumerate() provides a counter (position number) alongside each item as you loop." },

  { topic:"Loops", q:"What is printed?",
    code:'total = 0\nfor s in [100, 200, 300]:\n    total += s\nprint(total)', opts:["100","300","600","0"], ans:2,
    exp:"total starts at 0. Adding 100+200+300 = 600." },

  { topic:"Loops", q:"A while loop runs as long as…",
    code:null, opts:["The list has items","The condition is True","Python allows it","The variable equals zero"], ans:1,
    exp:"while loops continue executing as long as the given condition remains True." },

  /* ── FUNCTIONS (4) ── */
  { topic:"Functions", q:"What does calculate_vat(1000) return?",
    code:'def calculate_vat(price):\n    return price * 0.13', opts:["1000","130.0","0.13","1130.0"], ans:1,
    exp:"1000 × 0.13 = 130.0. The function multiplies price by the VAT rate and returns the result." },

  { topic:"Functions", q:"What is wrong here?",
    code:'def greet(name):\n    message = "Hello " + name\n\nprint(greet("Ram"))', opts:["Wrong indentation","Missing return — prints None","name is undefined","Nothing is wrong"], ans:1,
    exp:"The function builds the message but never returns it. Add 'return message' before the function ends." },

  { topic:"Functions", q:"What keyword is used to send a value back from a function?",
    code:null, opts:["send","yield","return","output"], ans:2,
    exp:"The return keyword sends a result back to wherever the function was called." },

  { topic:"Functions", q:"What does this function print when called as show_receipt('Ram', 500)?",
    code:'def show_receipt(name, amount):\n    print(f"{name}: Rs.{amount}")', opts:["name: Rs.amount","Ram: Rs.500","Error — two arguments","Nothing"], ans:1,
    exp:"f-strings replace {name} and {amount} with the actual argument values passed to the function." },

  /* ── ERROR HANDLING (4) ── */
  { topic:"Error Handling", q:"Which error occurs when you run int('esewa')?",
    code:null, opts:["TypeError","KeyError","ValueError","IndexError"], ans:2,
    exp:"ValueError occurs when a value has the right type but wrong format — like converting non-numeric text to int." },

  { topic:"Error Handling", q:"What does this print?",
    code:"try:\n    x = 10 / 0\nexcept ZeroDivisionError:\n    print('Cannot divide by zero')", opts:["0","Program crashes","Cannot divide by zero","None"], ans:2,
    exp:"The except block catches ZeroDivisionError and prints the message instead of crashing the program." },

  { topic:"Error Handling", q:"Which error occurs when accessing items[10] on a 3-item list?",
    code:null, opts:["KeyError","ValueError","IndexError","TypeError"], ans:2,
    exp:"IndexError occurs when you access a list position that does not exist." },

  { topic:"Error Handling", q:"What does the 'Exception' type catch?",
    code:null, opts:["Only ZeroDivisionError","Only ValueError","Only TypeErrors","All types of errors"], ans:3,
    exp:"Exception is the base class for all errors. It acts as a general catch-all safety net." },

  /* ── FILE HANDLING (4) ── */
  { topic:"File Handling", q:"Which mode adds content WITHOUT deleting existing content?",
    code:null, opts:['"w" — write','"r" — read','"a" — append','"x" — create'], ans:2,
    exp:'"a" (append) adds new content to the end. "w" (write) deletes everything first and starts fresh.' },

  { topic:"File Handling", q:"What does f.read() do?",
    code:'with open("report.txt","r") as f:\n    content = f.read()', opts:["Reads one line","Reads the entire file into a string","Reads word by word","Saves the file"], ans:1,
    exp:"f.read() reads the entire file content as one string and stores it in the variable." },

  { topic:"File Handling", q:"What does f.readlines() return?",
    code:null, opts:["A single string","A list where each item is one line","A tuple of characters","An integer count of lines"], ans:1,
    exp:"f.readlines() returns a list where each element is one line from the file (including the \\n character)." },

  { topic:"File Handling", q:"What error occurs if you try to open a file that doesn't exist in 'r' mode?",
    code:null, opts:["ValueError","TypeError","FileNotFoundError","IOError"], ans:2,
    exp:"FileNotFoundError is raised when Python cannot find the file you are trying to open." },

  /* ── SETS (2) ── */
  { topic:"Sets", q:"What does converting a list to a set do?",
    code:'cities = ["KTM","Pokhara","KTM","Lalitpur","Pokhara"]\nprint(len(set(cities)))', opts:["5","4","3","2"], ans:2,
    exp:"Sets remove duplicates. Unique cities: KTM, Pokhara, Lalitpur — that is 3." },

  { topic:"Sets", q:"Which operator finds items that appear in BOTH sets?",
    code:'jan = {"Ram","Sita","Hari"}\nfeb = {"Sita","Hari","Gita"}', opts:["| (union)","& (intersection)","- (difference)","^ (symmetric)"], ans:1,
    exp:"& gives the intersection — items that exist in both sets. Here: {'Sita','Hari'}." },

  /* ── API & REQUESTS (2) ── */
  { topic:"API & Requests", q:"Which HTTP method is used to READ data from an API?",
    code:null, opts:["POST","PUT","GET","DELETE"], ans:2,
    exp:"GET retrieves data from a server. POST sends new data, PUT updates, DELETE removes." },

  { topic:"API & Requests", q:"What does status code 200 mean in an API response?",
    code:null, opts:["Not Found","Unauthorized","Success — request was OK","Server Error"], ans:2,
    exp:"200 means the request was successful. 404 = Not Found, 401 = Unauthorized, 500 = Server Error." },
];

let current = 0;
let answered = [];
let score = 0;
let topicStats = {};
let started = false;

questions.forEach(q => {
  if (!topicStats[q.topic]) topicStats[q.topic] = { total: 0, correct: 0 };
  topicStats[q.topic].total++;
});

const LETTERS = ['A','B','C','D'];

function updateHeader() {
  const counter = document.getElementById('hdr-counter');
  const scorePill = document.getElementById('hdr-score');
  if (!started || current >= questions.length) {
    counter.textContent = '';
    scorePill.style.display = 'none';
    return;
  }
  counter.textContent = `${current + 1} / ${questions.length}`;
  scorePill.style.display = 'block';
  scorePill.textContent = `${score} correct`;
}

function updateProgress() {
  const pct = questions.length ? (current / questions.length) * 100 : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showIntro() {
  started = false;
  updateHeader(); updateProgress();
  const topics = [...new Set(questions.map(q => q.topic))];
  const chips = topics.map(t => `<span class="chip">${t}</span>`).join('');
  document.getElementById('main').innerHTML = `
    <div class="intro">
      <div class="intro-logo">🐍</div>
      <h1>Python Basics<br>MCQ Quiz</h1>
      <p class="intro-sub">
        50 questions across all topics taught so far.<br>
        Each question has instant feedback with an explanation.
      </p>
      <div class="intro-chips">${chips}</div>
      <button class="start-btn" onclick="startQuiz()">Start quiz →</button>
    </div>`;
}

function startQuiz() {
  started = true;
  renderQ();
}

function renderQ() {
  if (current >= questions.length) { showScore(); return; }
  updateHeader(); updateProgress();

  const q = questions[current];
  const t = TOPICS[q.topic] || { color:'#888', bg:'rgba(136,136,136,0.1)', border:'rgba(136,136,136,0.3)' };
  const isAns = answered[current] !== undefined;
  const chosen = answered[current];

  let optsHtml = q.opts.map((opt, i) => {
    let cls = 'opt-btn';
    if (isAns) {
      if (i === q.ans) cls += ' correct';
      else if (i === chosen) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="pickAnswer(${i})" ${isAns ? 'disabled' : ''}>
      <span class="opt-letter">${LETTERS[i]}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  const feedClass = isAns ? (chosen === q.ans ? 'correct' : 'wrong') : '';
  const feedIcon  = isAns ? (chosen === q.ans ? '✓' : '✗') : '';
  const feedMsg   = isAns ? `<span class="feedback-icon">${feedIcon}</span> ${q.exp}` : '';

  const isLast = current === questions.length - 1;
  const nextLabel = isLast ? 'See results →' : 'Next →';

  document.getElementById('main').innerHTML = `
    <div class="topic-badge" style="color:${t.color};background:${t.bg};border-color:${t.border}">
      ${q.topic}
    </div>
    <div class="q-card">
      <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.code ? `<div class="q-code">${escHtml(q.code)}</div>` : ''}
      <div class="options">${optsHtml}</div>
      <div class="feedback ${feedClass} ${isAns ? 'show' : ''}">${feedMsg}</div>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="prevQ()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn primary" onclick="nextQ()" ${!isAns ? 'disabled' : ''}>${nextLabel}</button>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pickAnswer(i) {
  if (answered[current] !== undefined) return;
  answered[current] = i;
  const q = questions[current];
  if (i === q.ans) {
    score++;
    topicStats[q.topic].correct++;
  }
  renderQ();
}

function nextQ() {
  if (current < questions.length - 1) { current++; renderQ(); }
  else showScore();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function showScore() {
  updateProgress();
  document.getElementById('progress').style.width = '100%';
  document.getElementById('hdr-counter').textContent = '';
  document.getElementById('hdr-score').style.display = 'none';

  const pct = Math.round((score / questions.length) * 100);
  let grade, gradeColor;
  if (pct >= 85) { grade = "Outstanding!"; gradeColor = '#22c98a'; }
  else if (pct >= 70) { grade = "Well done!"; gradeColor = '#38d9f5'; }
  else if (pct >= 50) { grade = "Good effort!"; gradeColor = '#f5a623'; }
  else { grade = "Keep practicing!"; gradeColor = '#f05b5b'; }

  const r = 70; const circ = 2 * Math.PI * r;
  const dash = circ * (pct / 100);

  let tbRows = Object.entries(topicStats).map(([topic, stat]) => {
    const t = TOPICS[topic] || { color: '#888' };
    const pctT = stat.total > 0 ? Math.round((stat.correct / stat.total) * 100) : 0;
    return `<div class="tb-row">
      <span class="tb-label">${topic}</span>
      <div class="tb-bar-wrap">
        <div class="tb-bar-fill" style="width:${pctT}%;background:${t.color}"></div>
      </div>
      <span class="tb-frac">${stat.correct}/${stat.total}</span>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="score-screen">
      <div class="score-ring">
        <svg viewBox="0 0 172 172">
          <circle cx="86" cy="86" r="${r}" fill="none" stroke="#1e2230" stroke-width="10"/>
          <circle cx="86" cy="86" r="${r}" fill="none"
            stroke="${gradeColor}" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="${dash} ${circ}"
            transform="rotate(-90 86 86)"
            style="transition:stroke-dasharray 1s ease"/>
        </svg>
        <div class="score-pct">${pct}%</div>
        <div class="score-sub">${score}/${questions.length}</div>
      </div>

      <div class="score-title" style="color:${gradeColor}">${grade}</div>
      <div class="score-desc">You answered ${score} out of ${questions.length} questions correctly.</div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" style="color:#22c98a">${score}</div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:#f05b5b">${questions.length - score}</div>
          <div class="stat-lbl">Incorrect</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${questions.length}</div>
          <div class="stat-lbl">Total</div>
        </div>
      </div>

      <div class="topic-breakdown">
        <div class="tb-title">Topic breakdown</div>
        ${tbRows}
      </div>

      <button class="restart-btn" onclick="restartQuiz()">Try again</button>
    </div>`;
}

function restartQuiz() {
  current = 0; answered = []; score = 0;
  Object.keys(topicStats).forEach(t => { topicStats[t].correct = 0; });
  showIntro();
}

showIntro();
</script>
</body>
</html>
