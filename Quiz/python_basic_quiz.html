<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Basics Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f2f7;
    --muted: #7a8099;
    --accent: #5b6af0;
    --accent2: #7c8df5;
    --green: #22c98a;
    --red: #f05b5b;
    --amber: #f5a623;
    --cyan: #38d9f5;
    --purple: #b06cf0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--muted);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .header-right { display: flex; gap: 16px; align-items: center; }
  .q-counter { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .score-pill {
    font-size: 12px; font-weight: 600;
    padding: 5px 14px; border-radius: 99px;
    background: rgba(91,106,240,0.15);
    border: 1px solid rgba(91,106,240,0.3);
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
  }

  .progress-wrap { height: 3px; background: var(--surface2); }
  .progress-fill {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    transition: width 0.4s ease;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  .topic-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 5px 14px;
    border-radius: 99px; border: 1px solid;
    margin-bottom: 20px;
    transition: all 0.3s;
  }

  .q-card {
    width: 100%; max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 36px 40px;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 19px; font-weight: 600;
    line-height: 1.55; color: var(--text);
    margin-bottom: 20px;
  }
  .q-code {
    font-family: 'DM Mono', monospace;
    font-size: 13.5px; line-height: 1.7;
    background: #0a0c10;
    border: 1px solid var(--border2);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    white-space: pre;
    overflow-x: auto;
    color: #c8d0f0;
  }

  /* OPTIONS */
  .options {
    display: block;
    margin-bottom: 24px;
  }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: #f0f2f7;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    text-align: left;
    width: 100%;
    word-break: break-word;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    user-select: none;
  }
  .opt-btn:hover {
    border-color: var(--accent2);
    background: rgba(91,106,240,0.1);
    transform: translateY(-1px);
  }
  .opt-btn.correct { border-color: var(--green) !important; background: rgba(34,201,138,0.12) !important; }
  .opt-btn.wrong   { border-color: var(--red)   !important; background: rgba(240,91,91,0.1)   !important; }
  .opt-btn.correct:hover, .opt-btn.wrong:hover { transform: none; }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500;
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 6px;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .opt-btn.correct { border-color: var(--green) !important; background: rgba(34,201,138,0.12) !important; }
  .opt-btn.wrong   { border-color: var(--red)   !important; background: rgba(240,91,91,0.1)   !important; }
  .opt-btn.correct:hover, .opt-btn.wrong:hover { transform: none; }

  .feedback {
    border-radius: 10px; padding: 14px 18px;
    font-size: 14px; line-height: 1.6;
    display: none; animation: fadeUp 0.25s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(34,201,138,0.1); border: 1px solid rgba(34,201,138,0.25); color: #6fffd4; }
  .feedback.wrong   { background: rgba(240,91,91,0.08); border: 1px solid rgba(240,91,91,0.2);   color: #ffaaaa; }
  .feedback-icon { font-size: 16px; margin-right: 6px; }

  .nav {
    width: 100%; max-width: 760px;
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px;
  }
  .nav-btn {
    padding: 11px 24px; border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent2); background: rgba(91,106,240,0.12); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nav-btn.primary:hover:not(:disabled) { background: var(--accent2); border-color: var(--accent2); }

  /* SCORE */
  .score-screen { width: 100%; max-width: 680px; text-align: center; animation: fadeUp 0.4s ease; }
  .score-ring {
    width: 160px; height: 160px; border-radius: 50%;
    border: 6px solid var(--surface2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 28px;
    position: relative;
  }
  .score-ring svg { position: absolute; top: -6px; left: -6px; width: calc(100% + 12px); height: calc(100% + 12px); }
  .score-pct { font-size: 42px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
  .score-sub { font-size: 13px; color: var(--muted); }
  .score-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .score-desc { font-size: 15px; color: var(--muted); margin-bottom: 32px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 20px 12px; }
  .stat-val { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .stat-lbl { font-size: 12px; color: var(--muted); }
  .topic-breakdown { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; margin-bottom: 28px; text-align: left; }
  .tb-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .tb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .tb-label { font-size: 13px; color: var(--text); min-width: 140px; }
  .tb-bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .tb-bar-fill { height: 6px; border-radius: 3px; transition: width 0.6s ease; }
  .tb-frac { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; }
  .restart-btn {
    padding: 14px 40px; border-radius: 12px;
    border: none; background: var(--accent);
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 24px rgba(91,106,240,0.3);
  }
  .restart-btn:hover { background: var(--accent2); transform: translateY(-2px); }

  /* INTRO */
  .intro { width: 100%; max-width: 680px; text-align: center; animation: fadeUp 0.4s ease; }
  .intro-logo {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; font-size: 28px;
  }
  .intro h1 { font-size: 32px; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
  .intro-sub { font-size: 15px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .intro-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 36px; }
  .chip { font-size: 12px; padding: 5px 13px; border-radius: 99px; border: 1px solid var(--border2); color: var(--muted); background: var(--surface); }
  .start-btn {
    padding: 15px 48px; border-radius: 12px;
    border: none; background: var(--accent);
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 28px rgba(91,106,240,0.35);
  }
  .start-btn:hover { background: var(--accent2); transform: translateY(-2px); }

  /* QUESTION NAVIGATOR */
  .nav-panel-wrap { width: 100%; max-width: 760px; margin-top: 16px; }
  .nav-panel-toggle {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; background: none; border: 1px solid var(--border2);
    border-radius: 10px; padding: 9px 16px;
    color: var(--muted); font-family: 'Sora', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s; width: 100%;
  }
  .nav-panel-toggle:hover { border-color: var(--accent2); color: var(--text); }
  .toggle-left { display: flex; align-items: center; gap: 8px; }
  .toggle-arrow { font-size: 10px; transition: transform 0.25s; display: inline-block; }
  .nav-panel-toggle.open .toggle-arrow { transform: rotate(180deg); }
  .nav-panel {
    display: none; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 12px;
    padding: 16px; margin-top: 8px; animation: fadeUp 0.2s ease;
  }
  .nav-panel.open { display: block; }
  .nav-panel-legend { display: flex; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px,1fr)); gap: 6px; }
  .q-dot {
    width: 100%; aspect-ratio: 1; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .q-dot:hover { border-color: var(--accent2); color: var(--text); transform: scale(1.1); }
  .q-dot.is-current { background: var(--accent); border-color: var(--accent); color: #fff; }
  .q-dot.is-correct { background: rgba(34,201,138,0.2); border-color: var(--green); color: var(--green); }
  .q-dot.is-wrong   { background: rgba(240,91,91,0.18); border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    Python Basics Quiz
  </div>
  <div class="header-right">
    <span class="q-counter" id="hdr-counter"></span>
    <span class="score-pill" id="hdr-score" style="display:none"></span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-fill" id="progress" style="width:0%"></div>
</div>

<div class="main" id="main"></div>

<script>
const LETTERS = ['A','B','C','D'];

const TOPICS = {
  "pip & Packages":   { color: '#38d9f5', bg: 'rgba(56,217,245,0.12)',   border: 'rgba(56,217,245,0.3)'   },
  "Variables":        { color: '#5b6af0', bg: 'rgba(91,106,240,0.15)',   border: 'rgba(91,106,240,0.35)'  },
  "Data Types":       { color: '#f5a623', bg: 'rgba(245,166,35,0.13)',   border: 'rgba(245,166,35,0.3)'   },
  "Strings":          { color: '#b06cf0', bg: 'rgba(176,108,240,0.13)',  border: 'rgba(176,108,240,0.3)'  },
  "Lists & Sets":     { color: '#22c98a', bg: 'rgba(34,201,138,0.13)',   border: 'rgba(34,201,138,0.3)'   },
  "Dictionaries":     { color: '#f05b5b', bg: 'rgba(240,91,91,0.12)',    border: 'rgba(240,91,91,0.28)'   },
  "API & Requests":   { color: '#38d9f5', bg: 'rgba(56,217,245,0.12)',   border: 'rgba(56,217,245,0.3)'   },
};

const questions = [

  /* ── pip & PACKAGES (8) ── */
  { topic:"pip & Packages",
    q:"What does pip stand for, and what is it used for?",
    code:null,
    opts:["Python In Place — stores files","Pip Installs Packages — Python's package manager","Package Import Protocol — imports libraries","Python Interface Program — starts the editor"],
    ans:1,
    exp:"pip stands for 'Pip Installs Packages'. It is Python's standard tool for downloading and installing third-party libraries from the internet (PyPI)." },

  { topic:"pip & Packages",
    q:"Where does pip download packages from by default?",
    code:null,
    opts:["GitHub","Google Drive","PyPI — Python Package Index","Anaconda Cloud"],
    ans:2,
    exp:"PyPI (pypi.org) is the official public repository for Python packages. pip connects to it unless you configure a custom source." },

  { topic:"pip & Packages",
    q:"Which command installs the pandas library?",
    code:null,
    opts:["python install pandas","import pandas","pip install pandas","get-package pandas"],
    ans:2,
    exp:"pip install pandas downloads and installs pandas from PyPI into your Python environment." },

  { topic:"pip & Packages",
    q:"What is pandas and why do we need it?",
    code:null,
    opts:["A web framework for building websites","A library for tabular data, DataFrames, and data analysis","A tool to connect Python to the internet","A graphics library for charts only"],
    ans:1,
    exp:"pandas provides the DataFrame — think of it as a programmable Excel table. It lets you load, clean, filter, aggregate, and analyze structured data efficiently." },

  { topic:"pip & Packages",
    q:"After installing a package with pip, what must you do to use it in your script?",
    code:null,
    opts:["Nothing — it loads automatically","Run pip activate pandas","Write import pandas at the top of the script","Restart your computer"],
    ans:2,
    exp:"Installing makes a package available on your system, but each script still needs an explicit import statement to load it into memory." },

  { topic:"pip & Packages",
    q:"Which command lists all packages currently installed in your Python environment?",
    code:null,
    opts:["pip list","pip show","pip packages","python --list"],
    ans:0,
    exp:"pip list shows every installed package and its version number. pip show <name> gives details about one specific package." },

  { topic:"pip & Packages",
    q:"Which command upgrades an already-installed package to the latest version?",
    code:null,
    opts:["pip update numpy","pip install --upgrade numpy","pip refresh numpy","pip reinstall numpy"],
    ans:1,
    exp:"pip install --upgrade <package> fetches the latest version from PyPI and replaces the currently installed one." },

  { topic:"pip & Packages",
    q:"Why do we need the requests library specifically?",
    code:null,
    opts:["To create databases","To talk to APIs — send HTTP requests and receive responses in Python","To draw bar charts","To read Excel files"],
    ans:1,
    exp:"The requests library makes HTTP calls simple — you can GET data from a URL or POST data to an API in just a few lines of code." },

  /* ── VARIABLES (5) ── */
  { topic:"Variables",
    q:"Which of the following is a valid Python variable name?",
    code:null,
    opts:["2sales","sales-amount","sales_amount","sales amount"],
    ans:2,
    exp:"Variable names cannot start with a digit, use hyphens, or contain spaces. Underscores are perfectly fine." },

  { topic:"Variables",
    q:"What is the value of x after this code runs?",
    code:"x = 10\nx = x + 5\nx = x * 2",
    opts:["10","15","30","50"],
    ans:2,
    exp:"x starts at 10 → adds 5 → becomes 15 → multiplied by 2 → final value is 30." },

  { topic:"Variables",
    q:"What does this f-string print?",
    code:'company = "eSewa"\nprint(f"Welcome to {company}!")',
    opts:["Welcome to {company}!","Welcome to eSewa!","Error","company"],
    ans:1,
    exp:"f-strings replace {variable} with the actual value of the variable at runtime. {company} becomes eSewa." },

  { topic:"Variables",
    q:"What is printed?",
    code:"a = 5\nb = a\na = 100\nprint(b)",
    opts:["100","5","None","Error"],
    ans:1,
    exp:"b = a copies the value 5 into b at that moment. Later changing a does not affect b — they are independent." },

  { topic:"Variables",
    q:"Which operator is used for assignment in Python?",
    code:null,
    opts:["==","=>","=",":="],
    ans:2,
    exp:"The single = is the assignment operator (stores a value). == is used for comparison (checking equality)." },

  /* ── DATA TYPES (5) ── */
  { topic:"Data Types",
    q:"What does type(99.50) return?",
    code:null,
    opts:["<class 'int'>","<class 'float'>","<class 'str'>","<class 'num'>"],
    ans:1,
    exp:"Any number with a decimal point is a float in Python." },

  { topic:"Data Types",
    q:"What is the data type of '45000' (with quotes around it)?",
    code:null,
    opts:["int","float","str","bool"],
    ans:2,
    exp:"Anything inside quotes is a string (str), even if it looks like a number. You cannot do math with it directly." },

  { topic:"Data Types",
    q:"Which data type stores True or False?",
    code:null,
    opts:["int","str","float","bool"],
    ans:3,
    exp:"bool (boolean) can only hold True or False — perfect for yes/no or on/off situations." },

  { topic:"Data Types",
    q:"Which type would you use to store the price Rs. 1250.75?",
    code:null,
    opts:["int","float","str","bool"],
    ans:1,
    exp:"float stores decimal (fractional) numbers. int only holds whole numbers like 1250." },

  { topic:"Data Types",
    q:"What does this print?",
    code:"x = True\nprint(type(x))",
    opts:["<class 'str'>","<class 'int'>","<class 'bool'>","True"],
    ans:2,
    exp:"True and False are of type bool in Python, not int or str." },

  /* ── STRINGS (5) ── */
  { topic:"Strings",
    q:"What does name.upper() produce?",
    code:'name = "pathao"\nprint(name.upper())',
    opts:["pathao","PATHAO","Pathao","Error"],
    ans:1,
    exp:".upper() converts every character in the string to uppercase letters." },

  { topic:"Strings",
    q:"Which method removes extra spaces from both sides of a string?",
    code:null,
    opts:[".remove()",".strip()",".clean()",".trim()"],
    ans:1,
    exp:".strip() removes leading and trailing whitespace (spaces, tabs, newlines). Very useful for cleaning user input." },

  { topic:"Strings",
    q:"What does this print?",
    code:'city = "pokhara"\nprint(city.capitalize())',
    opts:["POKHARA","pokhara","Pokhara","pOKHARA"],
    ans:2,
    exp:".capitalize() makes only the first letter uppercase and all others lowercase." },

  { topic:"Strings",
    q:"What is the output of this code?",
    code:'address = "Thamel,Kathmandu,Nepal"\nparts = address.split(",")\nprint(parts[1])',
    opts:["Thamel","Kathmandu","Nepal","Error"],
    ans:1,
    exp:".split(',') breaks the string into ['Thamel','Kathmandu','Nepal']. Index 1 (second item) is 'Kathmandu'." },

  { topic:"Strings",
    q:"What does len('Kathmandu') return?",
    code:null,
    opts:["7","8","9","10"],
    ans:2,
    exp:"'Kathmandu' has 9 characters: K-a-t-h-m-a-n-d-u." },

  /* ── LISTS & SETS (6) ── */
  { topic:"Lists & Sets",
    q:"What is the index of 'Tablet' in this list?",
    code:'products = ["Laptop","Mobile","Tablet","Charger"]',
    opts:["0","1","2","3"],
    ans:2,
    exp:"Python indexing starts at 0. Laptop=0, Mobile=1, Tablet=2, Charger=3." },

  { topic:"Lists & Sets",
    q:"Which method adds an item to the END of a list?",
    code:null,
    opts:[".insert()",".add()",".append()",".push()"],
    ans:2,
    exp:".append() adds a single item to the end of the list. .insert(i, val) adds at a specific position." },

  { topic:"Lists & Sets",
    q:"What does this print?",
    code:'items = ["A","B","C","D"]\nprint(items[-1])',
    opts:["A","B","C","D"],
    ans:3,
    exp:"Negative index -1 always refers to the last element. -2 would be 'C', and so on." },

  { topic:"Lists & Sets",
    q:"What is the result of this code?",
    code:'nums = [30,10,50,20]\nnums.sort()\nprint(nums)',
    opts:["[30,10,50,20]","[10,20,30,50]","[50,30,20,10]","Error"],
    ans:1,
    exp:".sort() rearranges the list in ascending order (low to high) in place and returns None." },

  { topic:"Lists & Sets",
    q:"What does a set do with duplicate values?",
    code:'cities = ["Kathmandu","Pokhara","Kathmandu","Lalitpur","Pokhara"]\nprint(len(set(cities)))',
    opts:["Keeps all 5","Keeps 3 unique values","Raises an error","Returns 0"],
    ans:1,
    exp:"A set automatically removes duplicates, keeping only unique values. The 3 unique cities are Kathmandu, Pokhara, Lalitpur." },

  { topic:"Lists & Sets",
    q:"What is the difference between a list and a set?",
    code:null,
    opts:["A list uses curly braces { }","A set allows duplicate values","A set only stores unique values and is unordered","A list is always sorted"],
    ans:2,
    exp:"Sets store only unique values and have no guaranteed order. Lists allow duplicates and maintain insertion order." },

  /* ── DICTIONARIES (10) ── */
  { topic:"Dictionaries",
    q:"What is a dictionary in Python?",
    code:null,
    opts:["An ordered list of items","A collection of key-value pairs","A set of unique numbers","A file that stores words"],
    ans:1,
    exp:"A dictionary stores data as key: value pairs — like a labeled container. Example: {\"name\": \"Ram\", \"city\": \"Kathmandu\"}" },

  { topic:"Dictionaries",
    q:"What happens if you access a missing key using square brackets?",
    code:'customer = {"name":"Ram","city":"KTM"}\nprint(customer["phone"])',
    opts:["Prints None","Prints an empty string","Raises a KeyError","Returns False"],
    ans:2,
    exp:"Using dict[\"key\"] directly raises a KeyError if the key does not exist. Use .get() for safe access." },

  { topic:"Dictionaries",
    q:"What does .get('phone') return if 'phone' key is missing?",
    code:null,
    opts:["KeyError","phone","None","0"],
    ans:2,
    exp:".get(key) safely returns None when the key is missing — it never crashes your program." },

  { topic:"Dictionaries",
    q:"What does .get('phone', 'Not provided') return when the key is missing?",
    code:null,
    opts:["None","KeyError","Not provided","phone"],
    ans:2,
    exp:".get(key, default) returns the default value you provide when the key does not exist." },

  { topic:"Dictionaries",
    q:"What does .update({}) do?",
    code:'emp = {"name":"Sita","salary":52000}\nemp.update({"salary":60000,"city":"Lalitpur"})\nprint(emp)',
    opts:["Adds only new keys","Updates existing keys and adds new ones","Only changes existing keys","Replaces the entire dictionary"],
    ans:1,
    exp:".update() is flexible — it updates keys that already exist AND adds keys that are new, all in one call." },

  { topic:"Dictionaries",
    q:"What does .setdefault(key, value) do?",
    code:null,
    opts:["Always overwrites the key","Adds the key only if it does not already exist","Removes the key","Returns all keys"],
    ans:1,
    exp:".setdefault() adds the key with the given value ONLY if the key is missing. If the key exists, it does nothing and returns the existing value." },

  { topic:"Dictionaries",
    q:"What does .pop('salary', 0) return when 'salary' is missing?",
    code:null,
    opts:["Raises a KeyError","Returns None","Returns 0","Deletes another key"],
    ans:2,
    exp:".pop(key, default) safely removes a key and returns its value. If the key is missing, it returns the default instead of crashing." },

  { topic:"Dictionaries",
    q:"Which loop gives you BOTH keys AND values at the same time?",
    code:'emp = {"name":"Sita","salary":52000}',
    opts:["for k in emp.keys()","for v in emp.values()","for k, v in emp.items()","for k, v in emp"],
    ans:2,
    exp:".items() returns each key-value pair as a tuple, which you unpack into two variables k and v." },

  { topic:"Dictionaries",
    q:"What does this print?",
    code:'d = {"a":1,"b":2,"c":3}\ndel d["b"]\nprint(len(d))',
    opts:["3","2","1","Error"],
    ans:1,
    exp:"del removes the key 'b'. The dictionary now has 2 remaining items: 'a' and 'c'." },

  { topic:"Dictionaries",
    q:"Which method returns all the keys of a dictionary as a view?",
    code:null,
    opts:[".keys()",".values()",".items()",".get()"],
    ans:0,
    exp:".keys() returns a view of all keys. .values() returns all values. .items() returns key-value pairs." },

  /* ── API & REQUESTS (8) ── */
  { topic:"API & Requests",
    q:"What does API stand for?",
    code:null,
    opts:["Automated Python Interface","Application Programming Interface","Advanced Package Installer","Automated Program Integrator"],
    ans:1,
    exp:"API stands for Application Programming Interface — it is a way for different programs to talk to each other and share data." },

  { topic:"API & Requests",
    q:"In the restaurant analogy taught in class, what does the API represent?",
    code:null,
    opts:["The customer placing an order","The kitchen preparing the food","The waiter carrying messages between customer and kitchen","The menu of available dishes"],
    ans:2,
    exp:"The API is like a waiter — you (your code) tell it what you want, it takes the request to the kitchen (server), and brings back the response." },

  { topic:"API & Requests",
    q:"Which HTTP method is used to READ/fetch data from an API?",
    code:null,
    opts:["POST","PUT","DELETE","GET"],
    ans:3,
    exp:"GET is used to retrieve/read data. POST is for sending new data. PUT updates. DELETE removes." },

  { topic:"API & Requests",
    q:"What does a status code 200 mean?",
    code:null,
    opts:["Server error","Not found","Request was successful","Unauthorized"],
    ans:1,
    exp:"200 OK means the request was successful and the server returned the expected data." },

  { topic:"API & Requests",
    q:"What does response.json() do?",
    code:'response = requests.get("https://jsonplaceholder.typicode.com/posts/1")\ndata = response.json()',
    opts:["Saves the response to a file","Converts the raw JSON text into a Python dictionary","Sends data to the API","Prints the response"],
    ans:1,
    exp:"response.json() parses the JSON string from the API and converts it into a Python dictionary you can work with normally." },

  { topic:"API & Requests",
    q:"What is the correct way to access the 'title' field from the API response?",
    code:"data = response.json()\n# data = {'id':1,'userId':1,'title':'Hello','body':'...'}",
    opts:["data.title","data->title","data['title']","data.get_title()"],
    ans:2,
    exp:"Once response.json() converts data to a dictionary, you access fields the same way as any dictionary: data['title']." },

  { topic:"API & Requests",
    q:"Which HTTP method is used to SEND new data to an API (e.g., placing a new order)?",
    code:null,
    opts:["GET","DELETE","POST","FETCH"],
    ans:2,
    exp:"POST is used to send new data to a server — like submitting a form, placing an order on Daraz, or creating a new user." },

  { topic:"API & Requests",
    q:"What does this code check and why is it important?",
    code:"if response.status_code == 200:\n    print('Success!')\nelse:\n    print('Something went wrong!')",
    opts:["It checks the internet speed","It checks if the API response was successful before using the data","It checks if the URL is correct","It checks if Python is installed"],
    ans:1,
    exp:"Always check the status code before using response data. A non-200 code means the request failed and the data may be incomplete or missing." },

];

/* ── State ── */
let current = 0, score = 0, answered = [], started = false, panelOpen = false;

const topicStats = {};
questions.forEach(q => {
  if (!topicStats[q.topic]) topicStats[q.topic] = { correct: 0, total: 0 };
  topicStats[q.topic].total++;
});

function updateHeader() {
  document.getElementById('hdr-counter').textContent = `${current + 1} / ${questions.length}`;
  const sp = document.getElementById('hdr-score');
  sp.style.display = 'block';
  sp.textContent = `Score: ${score}`;
}

function updateProgress() {
  const pct = questions.length > 0 ? ((current) / questions.length) * 100 : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showIntro() {
  document.getElementById('hdr-counter').textContent = '';
  document.getElementById('hdr-score').style.display = 'none';
  document.getElementById('progress').style.width = '0%';

  const topicList = Object.keys(TOPICS);
  const chips = topicList.map(t => {
    const tc = TOPICS[t];
    return `<span class="chip" style="color:${tc.color};border-color:${tc.border};background:${tc.bg}">${t}</span>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="intro">
      <div class="intro-logo">🐍</div>
      <h1>Python Basics Quiz</h1>
      <p class="intro-sub">
        ${questions.length} questions across all topics taught so far.<br>
        Get instant feedback with explanations for each answer.
      </p>
      <div class="intro-chips">${chips}</div>
      <button class="start-btn" onclick="startQuiz()">Start quiz →</button>
    </div>`;
}

function startQuiz() {
  started = true;
  renderQ();
}

function renderQ() {
  if (current >= questions.length) { showScore(); return; }
  updateHeader(); updateProgress();

  const q = questions[current];
  const t = TOPICS[q.topic] || { color:'#888', bg:'rgba(136,136,136,0.1)', border:'rgba(136,136,136,0.3)' };
  const isAns = answered[current] !== undefined;
  const chosen = answered[current];

  let optsHtml = q.opts.map((opt, i) => {
    let state = '';
    if (isAns) {
      if (i === q.ans) state = 'correct';
      else if (i === chosen) state = 'wrong';
    }
    const borderColor = state === 'correct' ? '#22c98a' : state === 'wrong' ? '#f05b5b' : 'rgba(255,255,255,0.13)';
    const bgColor     = state === 'correct' ? 'rgba(34,201,138,0.15)' : state === 'wrong' ? 'rgba(240,91,91,0.15)' : '#1e2230';
    const letterBg    = state === 'correct' ? '#22c98a' : state === 'wrong' ? '#f05b5b' : 'rgba(255,255,255,0.07)';
    const letterColor = state === 'correct' ? '#0d0f14' : state === 'wrong' ? '#ffffff' : '#7a8099';
    const cursor      = isAns ? 'default' : 'pointer';
    const onclick     = isAns ? '' : `pickAnswer(${i})`;
    return `<div onclick="${onclick}" style="
        cursor:${cursor};
        display:table;
        width:100%;
        padding:14px 16px;
        border-radius:12px;
        border:1px solid ${borderColor};
        background:${bgColor};
        box-sizing:border-box;
        margin-bottom:10px;
      ">
      <div style="display:table-cell;width:28px;vertical-align:middle;">
        <div style="
          width:24px;height:24px;border-radius:6px;
          background:${letterBg};
          display:flex;align-items:center;justify-content:center;
          font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
          color:${letterColor};
        ">${LETTERS[i]}</div>
      </div>
      <div style="display:table-cell;vertical-align:middle;padding-left:12px;font-family:'Sora',sans-serif;font-size:14px;line-height:1.5;color:#f0f2f7;">${escHtml(opt)}</div>
    </div>`;
  }).join('');

  const feedClass = isAns ? (chosen === q.ans ? 'correct' : 'wrong') : '';
  const feedIcon  = isAns ? (chosen === q.ans ? '✓' : '✗') : '';
  const feedMsg   = isAns ? `<span class="feedback-icon">${feedIcon}</span> ${q.exp}` : '';

  const isLast = current === questions.length - 1;
  const answeredCount = answered.filter(a => a !== undefined).length;

  const qDots = questions.map((_, i) => {
    let cls = 'q-dot';
    if (i === current) cls += ' is-current';
    else if (answered[i] !== undefined) {
      cls += answered[i] === questions[i].ans ? ' is-correct' : ' is-wrong';
    }
    return `<button class="${cls}" onclick="jumpTo(${i})" title="Question ${i+1}">${i+1}</button>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="topic-badge" style="color:${t.color};background:${t.bg};border-color:${t.border}">
      ${q.topic}
    </div>
    <div class="q-card">
      <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.code ? `<div class="q-code">${escHtml(q.code)}</div>` : ''}
      <div class="options">${optsHtml}</div>
      <div class="feedback ${feedClass} ${isAns ? 'show' : ''}">${feedMsg}</div>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="prevQ()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn primary" onclick="nextQ()">${isLast ? 'See results →' : 'Next →'}</button>
    </div>
    <div class="nav-panel-wrap">
      <button class="nav-panel-toggle" id="nav-toggle" onclick="togglePanel()">
        <span class="toggle-left">&#9776; Jump to question &nbsp;<span style="color:var(--accent2);font-family:'DM Mono',monospace;font-size:12px">${answeredCount}/${questions.length} answered</span></span>
        <span class="toggle-arrow" id="toggle-arrow">&#9660;</span>
      </button>
      <div class="nav-panel" id="nav-panel">
        <div class="nav-panel-legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Current</span>
          <span class="legend-item"><span class="legend-dot" style="background:rgba(34,201,138,0.5);border:1px solid var(--green)"></span>Correct</span>
          <span class="legend-item"><span class="legend-dot" style="background:rgba(240,91,91,0.4);border:1px solid var(--red)"></span>Wrong</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--surface2);border:1px solid var(--border2)"></span>Unanswered</span>
        </div>
        <div class="q-grid">${qDots}</div>
      </div>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pickAnswer(i) {
  if (answered[current] !== undefined) return;
  answered[current] = i;
  const q = questions[current];
  if (i === q.ans) {
    score++;
    topicStats[q.topic].correct++;
  }
  renderQ();
}

function nextQ() {
  if (current < questions.length - 1) { current++; renderQ(); }
  else showScore();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function jumpTo(i) {
  current = i;
  renderQ();
  // re-open panel after re-render
  if (panelOpen) {
    const p = document.getElementById('nav-panel');
    const t = document.getElementById('nav-toggle');
    const a = document.getElementById('toggle-arrow');
    if (p) p.classList.add('open');
    if (t) t.classList.add('open');
    if (a) a.style.transform = 'rotate(180deg)';
  }
}

function togglePanel() {
  panelOpen = !panelOpen;
  const p = document.getElementById('nav-panel');
  const t = document.getElementById('nav-toggle');
  const a = document.getElementById('toggle-arrow');
  if (p) p.classList.toggle('open', panelOpen);
  if (t) t.classList.toggle('open', panelOpen);
  if (a) a.style.transform = panelOpen ? 'rotate(180deg)' : '';
}

function showScore() {
  document.getElementById('progress').style.width = '100%';
  document.getElementById('hdr-counter').textContent = '';
  document.getElementById('hdr-score').style.display = 'none';

  const pct = Math.round((score / questions.length) * 100);
  let grade, gradeColor;
  if (pct >= 85)      { grade = "Outstanding!";    gradeColor = '#22c98a'; }
  else if (pct >= 70) { grade = "Well done!";       gradeColor = '#38d9f5'; }
  else if (pct >= 50) { grade = "Good effort!";     gradeColor = '#f5a623'; }
  else                { grade = "Keep practicing!"; gradeColor = '#f05b5b'; }

  const r = 70, circ = 2 * Math.PI * r, dash = circ * (pct / 100);

  const tbRows = Object.entries(topicStats).map(([topic, stat]) => {
    const tc = TOPICS[topic] || { color: '#888' };
    const pctT = stat.total > 0 ? Math.round((stat.correct / stat.total) * 100) : 0;
    return `<div class="tb-row">
      <span class="tb-label">${topic}</span>
      <div class="tb-bar-wrap"><div class="tb-bar-fill" style="width:${pctT}%;background:${tc.color}"></div></div>
      <span class="tb-frac">${stat.correct}/${stat.total}</span>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="score-screen">
      <div class="score-ring">
        <svg viewBox="0 0 172 172">
          <circle cx="86" cy="86" r="${r}" fill="none" stroke="#1e2230" stroke-width="10"/>
          <circle cx="86" cy="86" r="${r}" fill="none"
            stroke="${gradeColor}" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="${dash} ${circ}"
            transform="rotate(-90 86 86)"
            style="transition:stroke-dasharray 1s ease"/>
        </svg>
        <div class="score-pct">${pct}%</div>
        <div class="score-sub">${score}/${questions.length}</div>
      </div>
      <div class="score-title" style="color:${gradeColor}">${grade}</div>
      <div class="score-desc">You answered ${score} out of ${questions.length} questions correctly.</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" style="color:#22c98a">${score}</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-card"><div class="stat-val" style="color:#f05b5b">${questions.length - score}</div><div class="stat-lbl">Incorrect</div></div>
        <div class="stat-card"><div class="stat-val">${questions.length}</div><div class="stat-lbl">Total</div></div>
      </div>
      <div class="topic-breakdown">
        <div class="tb-title">Topic breakdown</div>
        ${tbRows}
      </div>
      <button class="restart-btn" onclick="restartQuiz()">Try again</button>
    </div>`;
}

function restartQuiz() {
  current = 0; answered = []; score = 0; panelOpen = false;
  Object.keys(topicStats).forEach(t => { topicStats[t].correct = 0; });
  showIntro();
}

showIntro();
</script>
</body>
</html>
