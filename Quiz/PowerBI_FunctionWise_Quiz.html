<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Power BI — Function Reference Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--surface:#161b22;--surf2:#21262d;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --text:#e6edf3;--muted:#8b949e;
  --accent:#1B6FE8;--acc-lt:rgba(27,111,232,0.12);
  --green:#059669;--red:#dc2626;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 5rem;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(27,111,232,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(27,111,232,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:760px;position:relative;z-index:1;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.logo{font-family:var(--display);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(27,111,232,0.5);}50%{box-shadow:0 0 0 6px rgba(27,111,232,0);}}
.score-badge{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surf2);border:1px solid var(--border2);border-radius:8px;padding:5px 14px;}

/* FUNCTION TABS */
.fn-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.2rem;}
.fn-tab{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surf2);color:var(--muted);cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.fn-tab:hover{border-color:var(--accent);color:var(--accent);}
.fn-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fn-tab.done-ok{border-color:var(--green);color:var(--green);background:rgba(5,150,105,0.08);}
.fn-tab.done-mixed{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.08);}

/* FUNCTION HEADER */
.fn-header{background:var(--surface);border:1px solid var(--border2);border-radius:14px 14px 0 0;padding:1.2rem 1.6rem 0.8rem;margin-bottom:1px;}
.fn-name{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.fn-syntax{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:8px;}
.fn-desc{font-size:13px;color:#94A3B8;line-height:1.6;}

/* PROGRESS */
.prog-bar-wrap{background:var(--surface);border-left:1px solid var(--border2);border-right:1px solid var(--border2);padding:0.6rem 1.6rem;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-label{font-family:var(--mono);font-size:11px;color:var(--muted);}
.prog-track{height:4px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.prog-fill{height:4px;background:linear-gradient(90deg,var(--accent),#34d399);border-radius:2px;transition:width 0.4s;}

/* QUESTION CARD */
.q-card{background:var(--surface);border:1px solid var(--border2);border-radius:0 0 14px 14px;padding:1.5rem 1.6rem 1.6rem;margin-bottom:1.2rem;}
.q-num{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em;}
.q-text{font-family:var(--display);font-size:17px;font-weight:600;line-height:1.5;margin-bottom:0.5rem;}
.q-code{font-family:var(--mono);font-size:12px;color:#e9c46a;background:#0a0f1a;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px 16px;margin:0.8rem 0 1rem;display:block;white-space:pre;line-height:1.8;overflow-x:auto;}
.options{display:flex;flex-direction:column;gap:8px;margin-top:1rem;}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border2);border-radius:9px;background:var(--surf2);cursor:pointer;transition:all 0.15s;user-select:none;}
.option:hover:not(.locked){border-color:var(--accent);background:var(--acc-lt);transform:translateX(3px);}
.opt-key{font-family:var(--mono);font-size:11px;font-weight:600;min-width:26px;height:26px;border-radius:5px;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;transition:all 0.15s;margin-top:1px;}
.opt-text{font-size:14px;line-height:1.5;color:var(--text);}
.opt-code{font-family:var(--mono);font-size:11.5px;color:#e9c46a;line-height:1.6;}
.option.correct{border-color:var(--green);background:rgba(5,150,105,0.1);}
.option.correct .opt-key{background:var(--green);border-color:var(--green);color:#fff;}
.option.wrong{border-color:var(--red);background:rgba(220,38,38,0.08);}
.option.wrong .opt-key{background:var(--red);border-color:var(--red);color:#fff;}
.option.reveal{border-color:var(--green);background:rgba(5,150,105,0.05);}
.option.reveal .opt-key{background:var(--green);border-color:var(--green);color:#fff;}
.option.locked{cursor:default;pointer-events:none;}
.feedback{display:none;margin-top:1rem;padding:14px 16px;border-radius:9px;font-size:13px;line-height:1.6;animation:su 0.2s ease;}
@keyframes su{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.feedback.show{display:block;}
.feedback.ok{background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.3);color:#6ee7b7;}
.feedback.bad{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);color:#fca5a5;}
.feedback strong{display:block;margin-bottom:4px;font-family:var(--display);font-size:14px;}
.feedback .why{color:var(--muted);font-size:12.5px;margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.06);}
.btn-row{display:flex;justify-content:flex-end;margin-top:1.2rem;}
.btn-next{display:none;font-family:var(--display);font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 26px;cursor:pointer;transition:all 0.2s;}
.btn-next:hover{background:#1558c0;}
.btn-next.show{display:block;}

/* FUNCTION COMPLETE PANEL */
.fn-complete{display:none;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:2rem;text-align:center;margin-bottom:1.2rem;}
.fn-complete.show{display:block;}
.fn-complete h3{font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:6px;}
.fn-complete p{font-size:13px;color:var(--muted);margin-bottom:1.4rem;}
.mini-stats{display:flex;gap:1rem;justify-content:center;margin-bottom:1.4rem;}
.mini-stat{background:var(--surf2);border:1px solid var(--border2);border-radius:9px;padding:10px 22px;text-align:center;}
.mini-stat .n{font-family:var(--display);font-size:20px;font-weight:800;}
.mini-stat .l{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px;}
.btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-primary{font-family:var(--display);font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 26px;cursor:pointer;transition:background 0.2s;}
.btn-primary:hover{background:#1558c0;}
.btn-ghost{font-family:var(--display);font-size:13px;font-weight:600;background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:9px;padding:10px 20px;cursor:pointer;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

/* OVERALL SCORE */
.overall{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:1.2rem 1.6rem;margin-bottom:1.2rem;}
.overall-title{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.8rem;}
.fn-score-grid{display:flex;flex-direction:column;gap:6px;}
.fn-score-row{display:flex;align-items:center;gap:10px;}
.fn-score-name{font-family:var(--mono);font-size:12px;color:var(--text);min-width:160px;}
.fn-score-bar-wrap{flex:1;height:8px;background:var(--surf2);border-radius:4px;overflow:hidden;}
.fn-score-bar{height:8px;border-radius:4px;transition:width 0.6s;}
.fn-score-pct{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:36px;text-align:right;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Power BI Functions</div>
    <div class="score-badge" id="score-badge">Score: 0 &nbsp;|&nbsp; 0 correct</div>
  </div>

  <!-- Function tabs -->
  <div class="fn-tabs" id="fn-tabs"></div>

  <!-- Overall progress -->
  <div class="overall" id="overall-panel">
    <div class="overall-title">Progress by Function</div>
    <div class="fn-score-grid" id="fn-score-grid"></div>
  </div>

  <!-- Function header -->
  <div class="fn-header" id="fn-header" style="display:none">
    <div class="fn-name" id="fn-name"></div>
    <div class="fn-syntax" id="fn-syntax"></div>
    <div class="fn-desc" id="fn-desc"></div>
  </div>

  <!-- Progress bar -->
  <div class="prog-bar-wrap" id="prog-wrap" style="display:none">
    <div class="prog-row">
      <span class="prog-label" id="prog-label">Q 1 of 4</span>
      <span class="prog-label" id="prog-score">0 / 0 correct</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- Question -->
  <div class="q-card" id="q-card" style="display:none">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <code class="q-code" id="q-code" style="display:none"></code>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn-next" id="btn-next" onclick="nextQ()">Next →</button>
    </div>
  </div>

  <!-- Function complete -->
  <div class="fn-complete" id="fn-complete">
    <h3 id="fc-title"></h3>
    <p id="fc-msg"></p>
    <div class="mini-stats">
      <div class="mini-stat"><div class="n" id="fc-correct" style="color:var(--green)">0</div><div class="l">Correct</div></div>
      <div class="mini-stat"><div class="n" id="fc-wrong"   style="color:var(--red)">0</div><div class="l">Wrong</div></div>
      <div class="mini-stat"><div class="n" id="fc-pct"     style="color:var(--accent)">0%</div><div class="l">Score</div></div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="fc-next-btn" onclick="nextFunction()">Next Function →</button>
      <button class="btn-ghost" onclick="retryFunction()">Retry This Function</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// FUNCTION BANK
// ═══════════════════════════════════════════════════
const FUNCTIONS = [
  {
    name:"SUM()",
    syntax:"SUM( Table[Column] )",
    desc:"Adds all values in a column together. Returns the grand total. Most common aggregation for Revenue, Quantity, and Cost.",
    color:"#1D4ED8",
    qs:[
      {
        q:"What does SUM( CafeSales[Total Spent] ) return?",
        opts:["The highest value in Total Spent","The number of rows in Total Spent","The total of all Total Spent values added together","The average of Total Spent"],
        ans:2,
        ok:"SUM adds every value in the column. It gives you the grand total — the most basic revenue measure.",
        why:"SUM = add all. AVERAGE = divide total by count. MAX = highest. MIN = lowest."
      },
      {
        q:"Which of these correctly creates a Total Revenue measure?",
        opts:["Total Revenue = COUNT( Sales[Revenue_NPR] )","Total Revenue = SUM( Sales[Revenue_NPR] )","Total Revenue = MAX( Sales[Revenue_NPR] )","Total Revenue = ROWS( Sales[Revenue_NPR] )"],
        ans:1,
        ok:"SUM(Sales[Revenue_NPR]) adds all revenue values together. COUNT would count how many rows have a value — not the total revenue.",
        why:"For any 'total money' measure: always SUM. For 'how many rows': COUNTROWS. For unique items: DISTINCTCOUNT."
      },
      {
        q:"What does SUMX( Sales_Reference, Sales_Reference[Quantity] * Sales_Reference[Unit_Price_NPR] ) do?",
        opts:["Same as SUM — adds all values in one column","Multiplies Quantity by Unit Price for each row then sums all the results","Counts rows where Quantity > Unit Price","Returns the maximum product of Quantity and Unit Price"],
        ans:1,
        ok:"SUMX is the iterator version of SUM. It runs the expression row by row and then adds all results together. SUM works on one column; SUMX works on any expression per row.",
        why:"SUMX(Table, Expression) = calculate expression per row, then SUM all results. Use when you need to multiply or combine columns."
      },
      {
        q:"SUM( Sales[Revenue_NPR] ) vs CALCULATE( SUM(Sales[Revenue_NPR]) ) — what is the difference?",
        opts:["They are identical — same result always","CALCULATE adds filter context control. Without CALCULATE, SUM uses whatever filters are already active. With CALCULATE you can add or change filters.","CALCULATE always returns more than SUM","SUM is faster than CALCULATE"],
        ans:1,
        ok:"Both SUM the same column, but CALCULATE gives you control over the filter context. CALCULATE(SUM(...)) alone has no extra filter — but you can add conditions: CALCULATE(SUM(...), filter).",
        why:"SUM alone = context-aware aggregation. CALCULATE(SUM(...)) = same but now you can modify the filter context by adding conditions."
      },
    ]
  },
  {
    name:"CALCULATE()",
    syntax:"CALCULATE( Expression, Filter1, Filter2, ... )",
    desc:"The most powerful DAX function. Evaluates an expression after applying one or more filters. Multiple filters = AND logic.",
    color:"#B91C1C",
    qs:[
      {
        q:"What does CALCULATE do to the filter context?",
        opts:["It removes all existing filters","It adds or replaces filters — then evaluates the expression inside that new filter context","It sorts the result","It groups rows like GROUP BY"],
        ans:1,
        ok:"CALCULATE modifies the filter context. It can add new filters, replace existing ones, or remove them (with ALL). Then it evaluates the expression inside that modified context.",
        why:"CALCULATE = change the filter context, then calculate. This is why it is the most powerful DAX function."
      },
      {
        q:"What does this measure return?",
        code:"Delivered Revenue =\n    CALCULATE(\n        SUM( Sales_Reference[Revenue_NPR] ),\n        Sales_Reference[Order_Status] = \"Delivered\"\n    )",
        opts:["Revenue for all orders","Revenue only for Delivered orders — the filter restricts SUM to Delivered rows only","Count of Delivered orders","Average revenue per Delivered order"],
        ans:1,
        ok:"CALCULATE(SUM(Revenue), Order_Status='Delivered') restricts the SUM to rows where Order_Status = Delivered. The filter narrows what SUM sees.",
        why:"CALCULATE(what, condition) = calculate 'what' but only for rows matching 'condition'."
      },
      {
        q:"When you pass multiple conditions to CALCULATE separated by commas, they act as:",
        code:"CALCULATE(\n    SUM( Sales_Reference[Revenue_NPR] ),\n    Sales_Reference[Payment_Method] = \"eSewa\",\n    Sales_Reference[Order_Status]   = \"Delivered\"\n)",
        opts:["OR — at least one must be true","AND — ALL conditions must be true","Only the first filter applies","Power BI throws a syntax error"],
        ans:1,
        ok:"Multiple filters in CALCULATE separated by commas = AND. Both Payment_Method = eSewa AND Order_Status = Delivered must be true. For OR, use FILTER with || inside.",
        why:"CALCULATE commas = AND. To use OR: CALCULATE(SUM(...), FILTER(Table, cond1 || cond2))."
      },
      {
        q:"CALCULATE( COUNTROWS(Sales_Reference), Sales_Reference[Order_Status] = \"Delivered\" ) — what does this count?",
        opts:["All 510 rows","Only the Delivered order rows","The number of distinct order statuses","Nothing — COUNTROWS cannot be inside CALCULATE"],
        ans:1,
        ok:"CALCULATE changes the filter to Delivered rows only — then COUNTROWS counts how many rows remain after that filter. Result: number of Delivered orders.",
        why:"CALCULATE works with ANY DAX expression inside — SUM, COUNTROWS, AVERAGE, DIVIDE etc."
      },
      {
        q:"What is CALCULATETABLE?",
        opts:["Same as CALCULATE but returns a table instead of a single value","A faster version of CALCULATE","A version of CALCULATE that works in Power Query","CALCULATETABLE does not exist in DAX"],
        ans:0,
        ok:"CALCULATETABLE(Table, Filter) applies filters and returns a filtered TABLE — not a single number. Use it when you need a filtered table as input to another function.",
        why:"CALCULATE = returns a value. CALCULATETABLE = returns a table. Used with SUMX, COUNTROWS, FILTER etc."
      },
    ]
  },
  {
    name:"FILTER()",
    syntax:"FILTER( Table, Condition )",
    desc:"Returns a table containing only rows where the condition is true. Like SQL WHERE. Returns a TABLE not a single value.",
    color:"#0F766E",
    qs:[
      {
        q:"What does FILTER() return?",
        opts:["A single aggregated value","A filtered TABLE — rows where the condition is true","The count of matching rows","A sorted version of the table"],
        ans:1,
        ok:"FILTER always returns a TABLE. It checks each row against the condition and keeps only rows where the condition is true. Use it inside CALCULATE when you need complex filter logic.",
        why:"FILTER = SQL WHERE. Returns TABLE. Never returns a number directly — wrap with SUM/COUNT etc."
      },
      {
        q:"What does && mean in a FILTER condition?",
        code:"FILTER(\n    Sales_Reference,\n    Sales_Reference[Order_Status] = \"Delivered\"\n        && Sales_Reference[Payment_Method] = \"eSewa\"\n)",
        opts:["OR — at least one must be true","NOT — exclude matching rows","AND — both conditions must be true","Concatenate two text values"],
        ans:2,
        ok:"&& means AND — both conditions must be true for a row to be included. Use || for OR (at least one must be true).",
        why:"&& = AND. || = OR. Wrap OR groups in ( ) when mixing: cond1 && ( cond2 || cond3 )."
      },
      {
        q:"Which is the correct way to filter Delivered AND eSewa orders?",
        opts:[
          "FILTER( Sales_Reference, Sales_Reference[Order_Status] = \"Delivered\" && Sales_Reference[Payment_Method] = \"eSewa\" )",
          "FILTER( Sales_Reference[Order_Status] = \"Delivered\" )",
          "FILTER( \"Delivered\", \"eSewa\" )",
          "FILTER( Sales_Reference ) WHERE Order_Status = \"Delivered\""
        ],
        ans:0,
        ok:"FILTER(Table, Condition) — the table comes first, then the condition. && combines two conditions with AND logic. Both must be true.",
        why:"Syntax: FILTER( TableName, Condition ). The condition always references the same table with TableName[ColumnName]."
      },
      {
        q:"What does || mean in a DAX condition?",
        code:"FILTER(\n    Sales_Reference,\n    Sales_Reference[Payment_Method] = \"eSewa\"\n        || Sales_Reference[Payment_Method] = \"Khalti\"\n)",
        opts:["AND — both must be true","OR — at least one must be true","NOT — exclude these rows","Divides two values"],
        ans:1,
        ok:"|| means OR — the row is included if Payment_Method = eSewa OR Payment_Method = Khalti. At least one condition must be true.",
        why:"|| = OR. Cleaner alternative: use IN { } operator: Sales_Reference[Payment_Method] IN { \"eSewa\", \"Khalti\" }."
      },
    ]
  },
  {
    name:"DIVIDE()",
    syntax:"DIVIDE( Numerator, Denominator, AlternateResult )",
    desc:"Safe division. Returns AlternateResult (usually 0) when denominator is zero instead of throwing an error.",
    color:"#0F766E",
    qs:[
      {
        q:"Why use DIVIDE() instead of the / operator?",
        opts:["DIVIDE() is faster","/ does not work in DAX","DIVIDE() safely handles divide-by-zero by returning the 3rd argument instead of an error","DIVIDE() automatically formats the result as a percentage"],
        ans:2,
        ok:"DIVIDE(A, B, 0) returns 0 (the 3rd argument) when B = 0, preventing errors. Using A/B would throw a divide-by-zero error and break your visual.",
        why:"Always use DIVIDE for any division. The third argument is the safe fallback value when denominator = 0."
      },
      {
        q:"What does DIVIDE( [Total Profit], [Total Revenue], 0 ) return when Total Revenue = 0?",
        opts:["Error","Infinity","Blank","0 — the third argument (alternate result)"],
        ans:3,
        ok:"When the denominator (Total Revenue) = 0, DIVIDE returns the third argument — which is 0. This keeps your visual working instead of showing an error.",
        why:"Third argument = what to return when denominator is 0. Usually set to 0 for ratios or BLANK() to hide the visual."
      },
      {
        q:"Which measure correctly calculates Profit Margin %?",
        opts:[
          "Profit Margin = [Total Profit] / [Total Revenue]",
          "Profit Margin = DIVIDE( [Total Profit], [Total Revenue], 0 )",
          "Profit Margin = SUM( Profit ) / SUM( Revenue )",
          "Profit Margin = CALCULATE( [Total Profit] / [Total Revenue] )"
        ],
        ans:1,
        ok:"DIVIDE([Total Profit], [Total Revenue], 0) is the correct pattern — using measure references and a safe fallback of 0.",
        why:"Use DIVIDE with measure references [MeasureName] — not raw column SUM() inside DIVIDE. Cleaner and reusable."
      },
    ]
  },
  {
    name:"COUNTROWS()",
    syntax:"COUNTROWS( Table )",
    desc:"Counts the number of rows in a table. The standard way to count transactions, orders, or records.",
    color:"#6D28D9",
    qs:[
      {
        q:"What is the difference between COUNTROWS() and COUNT()?",
        opts:[
          "They are identical",
          "COUNTROWS(Table) counts all rows including blanks. COUNT(Column) counts only rows where the column is not blank",
          "COUNT works on numbers only. COUNTROWS works on all types",
          "COUNTROWS is faster"
        ],
        ans:1,
        ok:"COUNTROWS(Table) = total rows including blanks. COUNT(Column) = rows where that specific column has a value. For transaction counts, COUNTROWS is more reliable.",
        why:"Use COUNTROWS(TableName) for total transaction counts. Use COUNT(Column) only when you specifically want to exclude blank rows in that column."
      },
      {
        q:"How do you count only Delivered orders using COUNTROWS?",
        code:"Delivered Orders =\n    CALCULATE(\n        COUNTROWS( Sales_Reference ),\n        Sales_Reference[Order_Status] = \"Delivered\"\n    )",
        opts:["This is wrong — COUNTROWS cannot be inside CALCULATE","This is correct — CALCULATE restricts the rows COUNTROWS sees to Delivered only","This counts all rows regardless of the filter","This counts only rows where Order_Status is blank"],
        ans:1,
        ok:"CALCULATE changes the filter context to Delivered rows only. Then COUNTROWS counts how many rows remain. This is the standard pattern for conditional row counts.",
        why:"Always use CALCULATE with COUNTROWS when you need a conditional count."
      },
      {
        q:"COUNTROWS( Sales_Reference ) vs DISTINCTCOUNT( Sales_Reference[Customer_ID] ) — what is the difference?",
        opts:[
          "They return the same number",
          "COUNTROWS counts total transactions (510). DISTINCTCOUNT counts unique customers only (e.g. 100 unique IDs even if they placed multiple orders)",
          "DISTINCTCOUNT counts total rows. COUNTROWS counts unique values",
          "COUNTROWS only works in Power Query"
        ],

        ok:"EndDate - StartDate gives a duration value. Duration.Days converts it to a plain number. + 1 includes the EndDate itself (e.g. Jan 1 to Dec 31 = 365 days but we need 366 including both endpoints).",
        why:"Always add + 1 to include the last day. Otherwise Dec 31 would be excluded from your DIM_Date table."
      },
    ]
  },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentFnIdx  = -1;   // which function is open
let currentQIdx   = 0;    // which question within the function
let locked        = false;
let fnResults     = {};   // { fnIdx: { correct, wrong, total } }
let totalCorrect  = 0;
let totalAnswered = 0;

// ═══════════════════════════════════════════════════
// INIT — build tabs and overview
// ═══════════════════════════════════════════════════
function init() {
  buildTabs();
  buildOverview();
  showOverview();
}

function buildTabs() {
  const wrap = document.getElementById('fn-tabs');
  wrap.innerHTML = '';
  FUNCTIONS.forEach((fn, i) => {
    const btn = document.createElement('button');
    btn.className = 'fn-tab';
    btn.textContent = fn.name;
    btn.dataset.idx = i;
    btn.onclick = () => openFunction(i);
    wrap.appendChild(btn);
  });
}

function buildOverview() {
  const grid = document.getElementById('fn-score-grid');
  grid.innerHTML = '';
  FUNCTIONS.forEach((fn, i) => {
    const r = fnResults[i];
    const pct = r ? Math.round((r.correct / r.total) * 100) : 0;
    const col = !r ? '#334155' : pct >= 75 ? '#059669' : pct >= 50 ? '#f59e0b' : '#dc2626';
    const row = document.createElement('div');
    row.className = 'fn-score-row';
    row.innerHTML = `
      <div class="fn-score-name">${fn.name}</div>
      <div class="fn-score-bar-wrap">
        <div class="fn-score-bar" style="width:${pct}%;background:${col}"></div>
      </div>
      <div class="fn-score-pct">${r ? pct+'%' : '—'}</div>`;
    row.style.cursor = 'pointer';
    row.onclick = () => openFunction(i);
    grid.appendChild(row);
  });
}

function showOverview() {
  document.getElementById('overall-panel').style.display  = 'block';
  document.getElementById('fn-header').style.display      = 'none';
  document.getElementById('prog-wrap').style.display      = 'none';
  document.getElementById('q-card').style.display         = 'none';
  document.getElementById('fn-complete').classList.remove('show');
  // reset active tab
  document.querySelectorAll('.fn-tab').forEach(t => t.classList.remove('active'));
}

// ═══════════════════════════════════════════════════
// OPEN A FUNCTION
// ═══════════════════════════════════════════════════
function openFunction(idx) {
  currentFnIdx = idx;
  currentQIdx  = 0;
  locked       = false;

  const fn = FUNCTIONS[idx];

  // Update tabs
  document.querySelectorAll('.fn-tab').forEach((t, i) => {
    t.classList.remove('active');
    if (i === idx) t.classList.add('active');
  });

  // Hide overview, show function panels
  document.getElementById('overall-panel').style.display = 'none';
  document.getElementById('fn-complete').classList.remove('show');

  // Function header
  document.getElementById('fn-header').style.display  = 'block';
  document.getElementById('fn-name').textContent      = fn.name;
  document.getElementById('fn-name').style.color      = fn.color;
  document.getElementById('fn-syntax').textContent    = fn.syntax;
  document.getElementById('fn-desc').textContent      = fn.desc;

  document.getElementById('prog-wrap').style.display  = 'block';
  document.getElementById('q-card').style.display     = 'block';

  // Init results tracking
  if (!fnResults[idx]) fnResults[idx] = { correct:0, wrong:0, total:fn.qs.length };

  renderQ();
}

// ═══════════════════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════════════════
function renderQ() {
  const fn = FUNCTIONS[currentFnIdx];
  const q  = fn.qs[currentQIdx];
  const total = fn.qs.length;

  document.getElementById('prog-label').textContent = `Q ${currentQIdx+1} of ${total}`;
  document.getElementById('prog-score').textContent = `${fnResults[currentFnIdx]?.correct||0} / ${total} correct`;
  document.getElementById('prog-fill').style.width  = `${(currentQIdx/total)*100}%`;

  document.getElementById('q-num').textContent = `QUESTION ${currentQIdx+1}`;
  document.getElementById('q-text').textContent = q.q;

  const ce = document.getElementById('q-code');
  if (q.code) { ce.textContent = q.code; ce.style.display='block'; }
  else         { ce.style.display='none'; }

  const ow = document.getElementById('options');
  ow.innerHTML = '';
  ['A','B','C','D'].forEach((k,i) => {
    if (i >= q.opts.length) return;
    const isCode = q.opts[i] && (q.opts[i].startsWith('Table.') || q.opts[i].startsWith('List.') || q.opts[i].startsWith('Date.') || q.opts[i].includes('SUM(') || q.opts[i].includes('CALCULATE') || q.opts[i].includes('EVALUATE') || q.opts[i].includes('= SUM') || q.opts[i].includes('= DIVIDE'));
    const d = document.createElement('div');
    d.className = 'option';
    d.dataset.idx = i;
    d.innerHTML = `<div class="opt-key">${k}</div><div class="${isCode?'opt-code':'opt-text'}">${q.opts[i]}</div>`;
    d.addEventListener('click', () => choose(i));
    ow.appendChild(d);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').classList.remove('show');
  locked = false;
}

// ═══════════════════════════════════════════════════
// CHOOSE ANSWER
// ═══════════════════════════════════════════════════
function choose(idx) {
  if (locked) return;
  locked = true;

  const fn = FUNCTIONS[currentFnIdx];
  const q  = fn.qs[currentQIdx];
  const isOk = idx === q.ans;

  document.querySelectorAll('.option').forEach((o,i) => {
    o.classList.add('locked');
    if (i === idx && isOk)  o.classList.add('correct');
    if (i === idx && !isOk) o.classList.add('wrong');
    if (i === q.ans && !isOk) o.classList.add('reveal');
  });

  if (isOk) { fnResults[currentFnIdx].correct++; totalCorrect++; }
  else       { fnResults[currentFnIdx].wrong++;                   }
  totalAnswered++;

  // Update score badge
  document.getElementById('score-badge').textContent = `Score: ${totalCorrect*10}  |  ${totalCorrect} correct`;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback '+(isOk?'ok':'bad')+' show';
  fb.innerHTML = `<strong>${isOk?'Correct! +10':'Incorrect'}</strong>${q.ok}<div class="why">💡 ${q.why}</div>`;

  const btn = document.getElementById('btn-next');
  btn.classList.add('show');
  const isLast = currentQIdx === fn.qs.length - 1;
  btn.textContent = isLast ? 'Finish Function →' : 'Next Question →';
}

// ═══════════════════════════════════════════════════
// NEXT QUESTION / FINISH FUNCTION
// ═══════════════════════════════════════════════════
function nextQ() {
  const fn = FUNCTIONS[currentFnIdx];
  currentQIdx++;

  if (currentQIdx >= fn.qs.length) {
    showFunctionComplete();
  } else {
    renderQ();
  }
}

function showFunctionComplete() {
  document.getElementById('q-card').style.display    = 'none';
  document.getElementById('prog-wrap').style.display = 'none';

  const r   = fnResults[currentFnIdx];
  const pct = Math.round((r.correct / r.total) * 100);
  const fn  = FUNCTIONS[currentFnIdx];

  let title, msg;
  if (pct === 100) { title = 'Perfect on ' + fn.name; msg = 'You fully understand this function!'; }
  else if (pct >= 75) { title = 'Good work!'; msg = 'Strong understanding of ' + fn.name + '.'; }
  else if (pct >= 50) { title = 'Getting there'; msg = 'Review the ' + fn.name + ' examples and try again.'; }
  else { title = 'Needs practice'; msg = 'Go back through the ' + fn.name + ' course material.'; }

  document.getElementById('fc-title').textContent   = title;
  document.getElementById('fc-msg').textContent     = msg;
  document.getElementById('fc-correct').textContent = r.correct;
  document.getElementById('fc-wrong').textContent   = r.wrong;
  document.getElementById('fc-pct').textContent     = pct + '%';

  // Update tab style
  const tabs = document.querySelectorAll('.fn-tab');
  tabs[currentFnIdx].classList.remove('active');
  tabs[currentFnIdx].classList.add(pct >= 75 ? 'done-ok' : 'done-mixed');

  // Next button text
  const nextIdx = currentFnIdx + 1;
  const nextBtn = document.getElementById('fc-next-btn');
  if (nextIdx < FUNCTIONS.length) {
    nextBtn.textContent = 'Next: ' + FUNCTIONS[nextIdx].name + ' →';
    nextBtn.style.display = 'block';
  } else {
    nextBtn.textContent = 'See Overall Results';
    nextBtn.style.display = 'block';
  }

  document.getElementById('fn-complete').classList.add('show');

  // Update overview bars
  buildOverview();
}

function nextFunction() {
  const nextIdx = currentFnIdx + 1;
  if (nextIdx < FUNCTIONS.length) {
    openFunction(nextIdx);
  } else {
    // All done — show overview
    document.getElementById('fn-header').style.display = 'none';
    document.getElementById('fn-complete').classList.remove('show');
    document.getElementById('overall-panel').style.display = 'block';
    document.querySelectorAll('.fn-tab').forEach(t => t.classList.remove('active'));
  }
}

function retryFunction() {
  fnResults[currentFnIdx] = { correct:0, wrong:0, total:FUNCTIONS[currentFnIdx].qs.length };
  document.getElementById('fn-complete').classList.remove('show');
  document.getElementById('fn-header').style.display  = 'block';
  document.getElementById('prog-wrap').style.display  = 'block';
  document.getElementById('q-card').style.display     = 'block';
  currentQIdx = 0;
  renderQ();
}

init();
</script>
</body>
</html>
